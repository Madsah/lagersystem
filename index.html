<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lagersystem</title>
<link rel="icon" href="data:,">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>

<!-- ZXing barcode scanner -->
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js" crossorigin></script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* ---- CONFIG NOTE ------------------------------------------------
     Replace the two placeholder values below with your real Supabase
     credentials (Project Settings → API in Supabase dashboard):
       SUPABASE_URL  → "Project URL"
       SUPABASE_KEY  → "anon public" key
     ----------------------------------------------------------------- */

  :root {
    --paper: #FAFAF7;
    --paper-dim: #F0EFE9;
    --ink: #1C1B19;
    --ink-soft: #5C5A54;
    --rust: #C4501C;
    --rust-dim: #E8D4C8;
    --good: #3D7A4F;
    --good-bg: #E4EEE5;
    --low: #B8842E;
    --low-bg: #F5EAD4;
    --crit: #B23B3B;
    --crit-bg: #F3E0DD;
    --line: #DEDCD3;
  }

  /* Dark theme */
  body.dark {
    --paper: #1A1917;
    --paper-dim: #242320;
    --ink: #F0EFE9;
    --ink-soft: #8A8880;
    --rust: #E06030;
    --rust-dim: #3A2218;
    --good: #4A9460;
    --good-bg: #1A2E1F;
    --low: #C89438;
    --low-bg: #2A2010;
    --crit: #C94848;
    --crit-bg: #2E1515;
    --line: #333230;
  }
  body.dark { background: var(--paper); color: var(--ink); }
  body.dark .login-wrap { background: #111110; }
  body.dark .login-box { background: var(--paper-dim); }
  body.dark .modal { background: var(--paper-dim); }
  body.dark .export-menu { background: var(--paper-dim); }
  body.dark input, body.dark select, body.dark textarea { background: var(--paper); color: var(--ink); border-color: var(--line); }
  body.dark tbody tr:hover { background: var(--paper-dim); }

  /* Dark theme toggle button */
  .theme-btn {
    font-family: 'IBM Plex Mono', monospace; font-size: 16px; background: none;
    border: 1px solid var(--line); border-radius: 4px; padding: 4px 8px;
    cursor: pointer; color: var(--ink-soft); line-height: 1;
  }
  .theme-btn:hover { border-color: var(--ink); color: var(--ink); }

  /* Dashboard */
  .dashboard-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px; margin-bottom: 28px;
  }
  .dash-card {
    border: 1px solid var(--line); border-radius: 6px; padding: 16px 18px;
    background: var(--paper); cursor: pointer; transition: border-color 0.12s, box-shadow 0.12s;
  }
  .dash-card:hover { border-color: var(--ink); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .dash-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .dash-card-name { font-family: 'Oswald', sans-serif; text-transform: uppercase; font-size: 16px; font-weight: 600; }
  .dash-card-stats { display: flex; gap: 16px; font-size: 12px; color: var(--ink-soft); margin-bottom: 12px; }
  .dash-card-stats b { color: var(--ink); }
  .dash-card-kritisk { font-size: 11px; margin-top: 6px; }
  .dash-card-kritisk span { display: inline-block; background: var(--crit-bg); color: var(--crit); padding: 2px 6px; border-radius: 3px; margin: 2px 2px 2px 0; font-weight: 600; }
  .dash-card-actions { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
  .dash-quick-btn {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 5px 10px;
    border: 1px solid var(--line); background: var(--paper-dim); border-radius: 3px;
    cursor: pointer; color: var(--ink-soft);
  }
  .dash-quick-btn:hover { border-color: var(--ink); color: var(--ink); }
  .dash-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1px; background: var(--line); border: 1px solid var(--line); margin-bottom: 24px; }
  .dash-summary-cell { background: var(--paper); padding: 14px 16px; }
  .dash-summary-num { font-family: 'Oswald', sans-serif; font-size: 28px; font-weight: 700; line-height: 1; }
  .dash-summary-num.crit { color: var(--crit); }
  .dash-summary-num.low { color: var(--low); }
  .dash-summary-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-soft); margin-top: 4px; }

  /* Mobile quick-count */
  .mobil-optaelling { padding: 0; }
  .mobil-vare-row { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--line); gap: 12px; }
  .mobil-vare-navn { flex: 1; font-weight: 600; font-size: 15px; }
  .mobil-vare-kat { font-size: 11px; color: var(--ink-soft); }
  .mobil-input { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 700; width: 80px; text-align: center; padding: 8px; border: 2px solid var(--line); border-radius: 4px; background: var(--paper); color: var(--ink); }
  .mobil-input:focus { border-color: var(--rust); outline: none; }
  .mobil-input.udfyldt { border-color: var(--good); background: var(--good-bg); }
  .mobil-footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--paper); border-top: 2px solid var(--ink); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; gap: 12px; z-index: 20; }
  .mobil-progress { font-size: 12px; color: var(--ink-soft); }

  * { box-sizing: border-box; }

  body { margin: 0; background: var(--paper); }

  #app {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.4;
  }

  /* LOGIN */
  .login-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--ink); padding: 20px;
  }
  .login-box {
    background: var(--paper); border-radius: 6px; padding: 36px 32px;
    width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .login-brand { font-family: 'Oswald', sans-serif; font-size: 26px; font-weight: 700; margin-bottom: 6px; }
  .login-brand span { color: var(--rust); }
  .login-sub { font-size: 12px; color: var(--ink-soft); margin-bottom: 28px; }
  .login-field { margin-bottom: 16px; }
  .login-field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-soft); margin-bottom: 5px; }
  .login-field input {
    width: 100%; font-family: 'IBM Plex Mono', monospace; font-size: 14px; border: 1px solid var(--line);
    background: var(--paper); padding: 10px 12px; border-radius: 3px;
  }
  .login-field input:focus { outline: none; border-color: var(--ink); }
  .login-btn {
    width: 100%; font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 700;
    background: var(--rust); color: white; border: none; padding: 12px; border-radius: 3px;
    cursor: pointer; margin-top: 8px;
  }
  .login-btn:hover { opacity: 0.88; }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-error { color: var(--crit); font-size: 12.5px; margin-top: 10px; text-align: center; }

  /* TOPBAR */
  .topbar {
    border-bottom: 3px solid var(--ink); padding: 16px 24px 12px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand-mark { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 22px; }
  .brand-mark span { color: var(--rust); }
  .brand-sub { font-size: 11px; color: var(--ink-soft); letter-spacing: 0.04em; }
  .topbar-right { display: flex; gap: 8px; align-items: center; }

  /* NAV */
  .nav { display: flex; border-bottom: 1px solid var(--line); overflow-x: auto; align-items: center; }
  .nav-btn {
    font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 0.03em;
    font-size: 13px; font-weight: 500; background: none; border: none;
    border-right: 1px solid var(--line); padding: 11px 18px; cursor: pointer;
    color: var(--ink-soft); white-space: nowrap;
  }
  .nav-btn:hover { background: var(--paper-dim); color: var(--ink); }
  .nav-btn.active { color: var(--ink); background: var(--paper-dim); box-shadow: inset 0 -3px 0 var(--rust); }
  .nav-add {
    margin-left: auto; margin-right: 14px; font-size: 12px; background: none;
    border: 1px dashed var(--line); border-radius: 4px; padding: 6px 12px;
    cursor: pointer; color: var(--ink-soft); white-space: nowrap;
  }
  .nav-add:hover { border-color: var(--ink); color: var(--ink); }

  .view-tabs { display: flex; gap: 6px; padding: 12px 24px 0; flex-wrap: wrap; }
  .vt-btn {
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; background: var(--paper);
    border: 1px solid var(--line); border-bottom: none; padding: 7px 14px; cursor: pointer;
    color: var(--ink-soft); border-radius: 4px 4px 0 0; position: relative; top: 1px;
  }
  .vt-btn.active { color: var(--ink); background: var(--paper-dim); font-weight: 600; }

  .panel { padding: 18px 24px 60px; }

  /* TYPOGRAPHY */
  .eyebrow { font-size: 10.5px; letter-spacing: 0.08em; color: var(--ink-soft); text-transform: uppercase; margin-bottom: 4px; }
  .section-title {
    font-family: 'Oswald', sans-serif; text-transform: uppercase; font-size: 19px; font-weight: 600;
    margin: 0 0 14px; display: flex; align-items: center; gap: 10px; justify-content: space-between; flex-wrap: wrap;
  }
  .section-title-left { display: flex; align-items: center; gap: 10px; }
  .item-name { font-weight: 600; }
  .item-cat { font-size: 11px; color: var(--ink-soft); }
  .delta { font-weight: 700; }
  .delta.used { color: var(--rust); }
  .delta.zero { color: var(--ink-soft); }

  /* TAGS */
  .tag {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; padding: 3px 7px;
    border-radius: 3px; font-weight: 600; display: inline-block;
  }
  .tag.good { background: var(--good-bg); color: var(--good); }
  .tag.low { background: var(--low-bg); color: var(--low); }
  .tag.crit { background: var(--crit-bg); color: var(--crit); }
  .tag.rust { background: var(--rust-dim); color: var(--rust); }

  /* TABLE */
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--ink-soft); font-weight: 500; padding: 0 10px 8px; border-bottom: 2px solid var(--ink);
  }
  thead th.num { text-align: right; }
  tbody td { padding: 10px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tbody tr:hover { background: var(--paper-dim); }

  /* BUTTONS */
  .btn {
    font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; font-weight: 600; border: 1px solid var(--ink);
    background: var(--ink); color: var(--paper); padding: 8px 14px; cursor: pointer; border-radius: 3px;
  }
  .btn:hover { opacity: 0.82; }
  .btn.ghost { background: transparent; color: var(--ink); }
  .btn.rust { background: var(--rust); border-color: var(--rust); color: white; }
  .btn.small { padding: 5px 10px; font-size: 11.5px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .row-actions { display: flex; gap: 6px; justify-content: flex-end; }
  .icon-btn {
    width: 26px; height: 26px; border: 1px solid var(--line); background: var(--paper); border-radius: 3px;
    cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; color: var(--ink-soft);
  }
  .icon-btn:hover { border-color: var(--ink); color: var(--ink); }

  /* TOOLBAR */
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
  .search-box {
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; border: 1px solid var(--line);
    background: var(--paper); padding: 8px 12px; border-radius: 3px; width: 220px;
  }
  .search-box:focus { outline: none; border-color: var(--ink); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(28,27,25,0.45); display: flex;
    align-items: center; justify-content: center; z-index: 50; padding: 16px;
  }
  .modal {
    background: var(--paper); border: 1px solid var(--ink); border-radius: 5px;
    width: 100%; max-width: 460px; max-height: 88vh; overflow-y: auto;
    box-shadow: 0 12px 32px rgba(0,0,0,0.25);
  }
  .modal.wide { max-width: 640px; }
  .modal-head { padding: 16px 20px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
  .modal-title { font-family: 'Oswald', sans-serif; text-transform: uppercase; font-size: 16px; font-weight: 600; }
  .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--ink-soft); }
  .modal-body { padding: 18px 20px; }
  .modal-foot { padding: 14px 20px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 8px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-soft); margin-bottom: 5px; }
  .field input, .field select, .field textarea {
    width: 100%; font-family: 'IBM Plex Mono', monospace; font-size: 13.5px;
    border: 1px solid var(--line); background: var(--paper); padding: 9px 10px; border-radius: 3px;
  }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--ink); }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .hint { font-size: 11.5px; color: var(--ink-soft); margin-top: -8px; margin-bottom: 14px; }

  /* STOCKTAKE MODAL */
  .opt-toolbar {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 10px 0 4px;
    position: sticky; top: 0; background: var(--paper); padding: 6px 0; z-index: 2;
  }
  .opt-filter-toggle {
    font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; background: var(--paper);
    border: 1px solid var(--line); border-radius: 3px; padding: 6px 10px; cursor: pointer; color: var(--ink-soft);
  }
  .opt-filter-toggle.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .opt-progress { font-size: 11.5px; color: var(--ink-soft); margin-left: auto; }
  .kategori-group { margin-top: 4px; }
  .kategori-head {
    display: flex; align-items: center; gap: 8px; padding: 10px 0 6px; cursor: pointer;
    font-family: 'Oswald', sans-serif; text-transform: uppercase; font-size: 13px; font-weight: 600;
    color: var(--ink-soft); border-bottom: 1px solid var(--line);
  }
  .kategori-head .chevron { transition: transform 0.15s; font-size: 11px; }
  .kategori-head.collapsed .chevron { transform: rotate(-90deg); }
  .kategori-count { font-family: 'IBM Plex Mono', monospace; font-weight: 400; font-size: 11px; color: var(--ink-soft); margin-left: auto; }
  .count-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--line); }
  .count-row.is-counted { background: var(--good-bg); }
  .count-row-name { flex: 1; }
  .count-row-name .item-name { font-size: 13.5px; }
  .count-input { width: 90px; text-align: right; }
  .count-input-small { width: 64px; text-align: right; }
  .count-pakke-group { display: flex; align-items: center; gap: 6px; }
  .count-pakke-group .unit-label { font-size: 10.5px; color: var(--ink-soft); }
  .conversion-hint { font-size: 11px; color: var(--ink-soft); margin-top: 5px; }

  /* HISTORY */
  .history-list { display: flex; flex-direction: column; }
  .history-row {
    display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--line);
    font-size: 12.5px; align-items: baseline; cursor: pointer;
  }
  .history-row:hover { background: var(--paper-dim); }
  .history-date { font-weight: 700; min-width: 110px; }
  .history-type {
    font-size: 10px; text-transform: uppercase; padding: 2px 7px; border-radius: 3px;
    font-weight: 700; min-width: 78px; text-align: center;
  }
  .history-type.optaelling { background: var(--rust-dim); color: var(--rust); }
  .history-type.levering { background: var(--good-bg); color: var(--good); }
  .history-type.spild { background: var(--crit-bg); color: var(--crit); }
  .history-type.pos { background: var(--low-bg); color: var(--low); }
  .history-who { color: var(--ink-soft); font-size: 11px; }

  /* COMPARISON */
  .compare-table { overflow-x: auto; }
  .compare-table table { min-width: 600px; }
  .compare-table th.month-col, .compare-table td.month-col { text-align: right; min-width: 78px; }
  .compare-cell-up { color: var(--crit); }
  .compare-cell-down { color: var(--good); }
  .compare-empty-note { font-size: 11px; color: var(--ink-soft); }

  /* PERIODE TOOLBAR */
  .periode-toolbar {
    display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap;
    background: var(--paper-dim); border: 1px solid var(--line); border-radius: 5px;
    padding: 12px 14px; margin-bottom: 18px;
  }
  .periode-toolbar .field { margin-bottom: 0; }
  .periode-toolbar input[type="date"] { width: 150px; }

  /* EXPORT DROPDOWN */
  .export-wrap { position: relative; display: inline-block; }
  .export-menu {
    position: absolute; right: 0; top: calc(100% + 4px); background: var(--paper);
    border: 1px solid var(--ink); border-radius: 4px; min-width: 220px; z-index: 10;
    box-shadow: 0 6px 18px rgba(0,0,0,0.15); overflow: hidden;
  }
  .export-menu button {
    display: block; width: 100%; text-align: left; padding: 9px 12px; font-size: 12.5px;
    font-family: 'IBM Plex Mono', monospace; background: none; border: none;
    border-bottom: 1px solid var(--line); cursor: pointer; color: var(--ink);
  }
  .export-menu button:last-child { border-bottom: none; }
  .export-menu button:hover { background: var(--paper-dim); }

  /* STATUS */
  .banner {
    background: var(--paper-dim); border: 1px dashed var(--line); border-radius: 4px;
    padding: 10px 14px; font-size: 11.5px; color: var(--ink-soft); margin-bottom: 18px;
    display: flex; gap: 8px; align-items: flex-start;
  }
  .banner.reminder { border-color: var(--low); background: var(--low-bg); color: var(--low); }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 50px 20px; color: var(--ink-soft); }
  .empty-state .display { font-family: 'Oswald', sans-serif; text-transform: uppercase; font-size: 16px; margin-bottom: 6px; color: var(--ink); }

  /* LOADING SPINNER */
  .spinner-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; color: var(--ink-soft); font-size: 13px; }

  /* PRINT */
  .print-report { display: none; }
  body.printing-report .print-report { display: block; padding: 32px; }
  body.printing-report .app-shell { display: none; }
  .print-report-head { margin-bottom: 18px; }
  .print-report-head h1 { font-family: 'Oswald', sans-serif; font-size: 22px; margin: 0 0 4px; text-transform: uppercase; }
  .print-report-meta { font-size: 12px; color: var(--ink-soft); }
  .print-report-section-title { font-family: 'Oswald', sans-serif; text-transform: uppercase; font-size: 14px; font-weight: 600; margin: 22px 0 8px; }
  .print-report-empty { font-size: 12px; color: var(--ink-soft); padding: 10px 0; }
  @media print {
    body.printing-report .print-report { display: block; }
    .no-print { display: none !important; }
  }

  /* MOBILE */
  @media (max-width: 640px) {
    .panel { padding: 14px 14px 50px; }
    .topbar { padding: 14px 14px 12px; }
    .count-input, .count-input-small { font-size: 16px; padding: 10px 8px; }
    .count-row { padding: 12px 0; }
    .count-pakke-group { gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .count-input-small { width: 56px; }
    .lager-table thead th:nth-child(2), .lager-table tbody td:nth-child(2),
    .lager-table thead th:nth-child(6), .lager-table tbody td:nth-child(6),
    .lager-table thead th:nth-child(7), .lager-table tbody td:nth-child(7) { display: none; }
  }

  /* Barcode scanner */
  .scanner-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
  }
  .scanner-video-wrap {
    position: relative; width: 100%; max-width: 360px; border-radius: 8px; overflow: hidden;
    border: 2px solid var(--rust);
  }
  .scanner-video { width: 100%; display: block; }
  .scanner-line {
    position: absolute; left: 0; right: 0; height: 2px; background: var(--rust);
    animation: scanline 2s ease-in-out infinite;
  }
  @keyframes scanline { 0%, 100% { top: 20%; } 50% { top: 80%; } }
  .scanner-hint { color: white; font-size: 13px; margin-top: 16px; text-align: center; opacity: 0.8; }
  .scanner-result { color: var(--good); font-size: 14px; margin-top: 12px; font-weight: 700; text-align: center; }

const { useState, useEffect, useCallback, useRef } = React;

// ---- Helpers ----
function todayStr() { return new Date().toISOString().slice(0, 10); }
function nowISO() { return new Date().toISOString(); }
function fmtDateShort(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('da-DK', { day: '2-digit', month: 'short', year: 'numeric' });
}
function fmtDateTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('da-DK', { day: '2-digit', month: 'short' }) + ' kl. ' + d.toLocaleTimeString('da-DK', { hour: '2-digit', minute: '2-digit' });
}
function fmtPakkeLoese(vare, antalPakker, antalLoese) {
  if (!vare) return '';
  const p = antalPakker || 0, l = antalLoese || 0;
  if (vare.pakke_str && vare.pakke_antal && p > 0) {
    return l > 0 ? `${p} ${vare.pakke_str} + ${l} ${vare.enhed}` : `${p} ${vare.pakke_str}`;
  }
  return `${l} ${vare.enhed}`;
}
function harPakke(vare) {
  return !!(vare && vare.pakke_str && vare.pakke_antal && vare.pakke_antal > 0);
}
function toStkCombo(vare, antalPakker, antalLoese) {
  const p = parseFloat(antalPakker), l = parseFloat(antalLoese);
  const pVal = isNaN(p) ? 0 : p, lVal = isNaN(l) ? 0 : l;
  if (isNaN(p) && isNaN(l)) return null;
  if (harPakke(vare)) return +(pVal * vare.pakke_antal + lVal).toFixed(3);
  return lVal;
}
function daysSince(dateStr) {
  return Math.floor((new Date(todayStr()) - new Date(dateStr)) / 86400000);
}
function fmtMaaned(m) {
  const navne = ['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
  const [aar, maaned] = m.split('-');
  return `${navne[parseInt(maaned, 10) - 1]} ${aar}`;
}

// ---- CSV export ----
function csvCelle(v) {
  const s = (v === null || v === undefined) ? '' : String(v);
  if (/[;"\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}
function downloadCSV(filnavn, raekker) {
  const csv = raekker.map(r => r.map(csvCelle).join(';')).join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filnavn;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ---- POS text parsing ----
function parsePosTekst(raaTekst) {
  const linjer = raaTekst.split('\n').map(l => l.trim()).filter(Boolean);
  const resultater = [];
  linjer.forEach(linje => {
    let dele = linje.split('\t').map(s => s.trim()).filter(Boolean);
    let navn, antalStr;
    if (dele.length >= 2 && /-?\d/.test(dele[1])) { navn = dele[0]; antalStr = dele[1]; }
    else {
      const match = linje.match(/^(.*?)([\d.,]+)\s*(?:stk|x)?\.?\s*$/i);
      if (match) { navn = match[1].trim(); antalStr = match[2]; }
    }
    if (!navn || antalStr === undefined) return;
    let cleaned = antalStr.replace(/\s/g, '');
    const harKomma = cleaned.includes(','), harPunktum = cleaned.includes('.');
    if (harKomma && harPunktum) { cleaned = cleaned.replace(/\./g, '').replace(',', '.'); }
    else if (harKomma) { cleaned = cleaned.replace(',', '.'); }
    else if (harPunktum) { const ep = cleaned.split('.').pop(); if (ep.length === 3) cleaned = cleaned.replace(/\./g, ''); }
    const antal = parseFloat(cleaned);
    if (!navn || isNaN(antal)) return;
    resultater.push({ raaNavn: navn, antal });
  });
  return resultater;
}
function normaliserNavn(s) { return (s || '').toLowerCase().replace(/[^a-z0-9æøå]+/g, ' ').trim(); }
function matchScore(a, b) {
  const na = normaliserNavn(a), nb = normaliserNavn(b);
  if (!na || !nb) return 0;
  if (na === nb) return 1;
  if (nb.includes(na) || na.includes(nb)) return 0.85;
  const aO = na.split(' ').filter(Boolean), bO = nb.split(' ').filter(Boolean);
  if (!aO.length || !bO.length) return 0;
  return aO.filter(o => bO.includes(o)).length / Math.max(aO.length, bO.length);
}
function matchPosLinjer(linjer, varer) {
  return linjer.map(l => {
    let bedste = null, bedsteScore = 0;
    varer.forEach(v => { const s = matchScore(l.raaNavn, v.navn); if (s > bedsteScore) { bedsteScore = s; bedste = v; } });
    return { ...l, vareId: bedsteScore >= 0.34 ? (bedste ? bedste.id : null) : null, sikker: bedsteScore >= 0.7 };
  });
}

function BarcodeScanner({ onResult, onClose }) {
  const videoRef = React.useRef(null);
  const [status, setStatus] = React.useState('starter…');
  const [fejl, setFejl] = React.useState('');
  const readerRef = React.useRef(null);

  React.useEffect(() => {
    let codeReader = null;
    async function start() {
      try {
        if (typeof ZXing === 'undefined') {
          setFejl('Stregkode-biblioteket kunne ikke indlæses. Tjek din internetforbindelse.');
          return;
        }
        codeReader = new ZXing.BrowserMultiFormatReader();
        readerRef.current = codeReader;
        setStatus('Hold stregkoden foran kameraet…');
        // Don't list devices — just start with environment-facing camera directly
        await codeReader.decodeFromConstraints(
          { video: { facingMode: 'environment' } },
          videoRef.current,
          (result, err) => {
            if (result) {
              setStatus('Stregkode fundet! Slår op…');
              onResult(result.getText());
            }
          }
        );
      } catch (e) {
        setFejl(`Kunne ikke starte kamera: ${e.message}`);
      }
    }
    start();
    return () => { if (readerRef.current) { try { readerRef.current.reset(); } catch(e) {} } };
  }, []);

  return (
    <div className="scanner-overlay">
      <div className="scanner-video-wrap">
        <video ref={videoRef} className="scanner-video" autoPlay playsInline muted />
        <div className="scanner-line" />
      </div>
      {!fejl && <div className="scanner-hint">{status}</div>}
      {fejl && <div className="scanner-error">{fejl}</div>}
      <button className="btn ghost" style={{ marginTop: 20, color: 'white', borderColor: 'rgba(255,255,255,0.3)' }} onClick={onClose}>Annullér</button>
    </div>
  );
}

// ================================================================
// MOBIL OPTAELLING COMPONENT (needs its own hooks, so a real component)
// ================================================================
function MobilOptaelling({ varerForRest, activeRestId, restNavn, harPakke, toStkCombo, addOptaelling, saving, onDone, onCancel }) {
  const [mCounts, setMCounts] = useState(() => {
    const c = {};
    varerForRest.forEach(it => { c[it.id] = { pakker: '', loese: '' }; });
    return c;
  });
  const [mDato, setMDato] = useState(todayStr());
  const [mHvem, setMHvem] = useState('');

  const udfyldte = varerForRest.filter(it => {
    const c = mCounts[it.id] || {};
    return (c.pakker !== '' && c.pakker !== undefined) || (c.loese !== '' && c.loese !== undefined);
  }).length;

  async function gem() {
    const counts = {};
    let any = false;
    varerForRest.forEach(it => {
      const c = mCounts[it.id] || {};
      if ((c.pakker !== '' && c.pakker !== undefined) || (c.loese !== '' && c.loese !== undefined)) {
        const stk = toStkCombo(it, c.pakker, c.loese);
        if (stk !== null) { counts[it.id] = { stk, antalPakker: parseFloat(c.pakker) || 0, antalLoese: parseFloat(c.loese) || 0 }; any = true; }
      }
    });
    if (!any) { alert('Indtast mindst ét antal.'); return; }
    await addOptaelling({ dato: mDato, counts, note: '', hvem: mHvem });
    onDone();
  }

  const kategorier = [];
  varerForRest.forEach(it => {
    const k = it.kategori || 'Andet';
    let g = kategorier.find(g => g.navn === k);
    if (!g) { g = { navn: k, varer: [] }; kategorier.push(g); }
    g.varer.push(it);
  });

  return (
    <div className="mobil-optaelling">
      <div style={{ padding: '12px 16px 8px', borderBottom: '1px solid var(--line)', display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
        <div style={{ fontFamily: 'Oswald, sans-serif', textTransform: 'uppercase', fontSize: 16, fontWeight: 700 }}>Hurtig optælling — {restNavn(activeRestId)}</div>
        <input type="date" value={mDato} onChange={e => setMDato(e.target.value)} style={{ fontSize: 13, padding: '4px 8px', border: '1px solid var(--line)', borderRadius: 3, background: 'var(--paper)', color: 'var(--ink)' }} />
        <input value={mHvem} onChange={e => setMHvem(e.target.value)} placeholder="dit navn (valgfri)" style={{ fontSize: 13, padding: '4px 8px', border: '1px solid var(--line)', borderRadius: 3, background: 'var(--paper)', color: 'var(--ink)', width: 160 }} />
      </div>
      {kategorier.map(gruppe => (
        <div key={gruppe.navn}>
          <div style={{ padding: '8px 16px', background: 'var(--paper-dim)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--ink-soft)', fontFamily: 'Oswald, sans-serif', fontWeight: 600 }}>{gruppe.navn}</div>
          {gruppe.varer.map(it => {
            const c = mCounts[it.id] || { pakker: '', loese: '' };
            const erUdfyldt = (c.pakker !== '' && c.pakker !== undefined) || (c.loese !== '' && c.loese !== undefined);
            return (
              <div className="mobil-vare-row" key={it.id} style={{ background: erUdfyldt ? 'var(--good-bg)' : 'var(--paper)' }}>
                <div style={{ flex: 1 }}>
                  <div className="mobil-vare-navn">{it.navn}</div>
                  <div className="mobil-vare-kat">{it.enhed}{harPakke(it) ? ` · ${it.pakke_str}=${it.pakke_antal}` : ''}</div>
                </div>
                {harPakke(it) ? (
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <div style={{ textAlign: 'center' }}>
                      <div style={{ fontSize: 9, color: 'var(--ink-soft)', marginBottom: 2 }}>{it.pakke_str}</div>
                      <input className={`mobil-input ${c.pakker !== '' ? 'udfyldt' : ''}`} type="number" min="0" inputMode="numeric" placeholder="0" value={c.pakker} onChange={e => setMCounts({ ...mCounts, [it.id]: { ...c, pakker: e.target.value } })} />
                    </div>
                    <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginTop: 14 }}>+</div>
                    <div style={{ textAlign: 'center' }}>
                      <div style={{ fontSize: 9, color: 'var(--ink-soft)', marginBottom: 2 }}>løse</div>
                      <input className={`mobil-input ${c.loese !== '' ? 'udfyldt' : ''}`} type="number" min="0" inputMode="numeric" placeholder="0" value={c.loese} onChange={e => setMCounts({ ...mCounts, [it.id]: { ...c, loese: e.target.value } })} />
                    </div>
                  </div>
                ) : (
                  <input className={`mobil-input ${c.loese !== '' ? 'udfyldt' : ''}`} type="number" min="0" inputMode="numeric" placeholder="0" value={c.loese} onChange={e => setMCounts({ ...mCounts, [it.id]: { ...c, loese: e.target.value } })} />
                )}
              </div>
            );
          })}
        </div>
      ))}
      <div style={{ height: 80 }} />
      <div className="mobil-footer">
        <button className="btn ghost" onClick={onCancel}>Annullér</button>
        <span className="mobil-progress">{udfyldte} / {varerForRest.length} talt</span>
        <button className="btn rust" onClick={gem} disabled={saving}>Gem optælling</button>
      </div>
    </div>
  );
}

function App() {
  const [session, setSession] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);

  useEffect(() => {
    db.auth.getSession().then(({ data: { session } }) => { setSession(session); setAuthLoading(false); });
    const { data: { subscription } } = db.auth.onAuthStateChange((_event, session) => setSession(session));
    return () => subscription.unsubscribe();
  }, []);

  if (authLoading) return <div className="spinner-wrap">Indlæser…</div>;
  if (!session) return <LoginScreen />;
  return <MainApp session={session} />;
}

        <form onSubmit={handleLogin}>
          <div className="login-field"><label>E-mail</label><input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="din@email.dk" required autoFocus /></div>
          <div className="login-field"><label>Adgangskode</label><input type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="••••••••" required /></div>
          {error && <div className="login-error">{error}</div>}
          <button className="login-btn" type="submit" disabled={loading}>{loading ? 'Logger ind…' : 'Log ind'}</button>
        </form>
      </div>
    </div>
  );
}

// ================================================================
// MAIN APP
// ================================================================
function MainApp({ session }) {
  const [restauranter, setRestauranter] = useState([]);
  const [activeRestId, setActiveRestId] = useState(null);
  const [restData, setRestData] = useState({ varer: [], optaellinger: [], leverancer: [], spild: [], posTal: [] });

  const [brugerRolle, setBrugerRolle] = useState('admin'); // 'admin' or 'personale'
  const [adgangRestIds, setAdgangRestIds] = useState(null); // null = alle, array = specifikke
  const [view, setView] = useState('dashboard');
  const [search, setSearch] = useState('');
  const [globalSoeg, setGlobalSoeg] = useState('');
  const [modal, setModal] = useState(null);
  const [printView, setPrintView] = useState(null);
  const [darkMode, setDarkMode] = useState(() => localStorage.getItem('darkMode') === 'true');
  const [periodeFra, setPeriodeFra] = useState(() => { const d = new Date(); d.setDate(d.getDate() - 30); return d.toISOString().slice(0, 10); });
  const [periodeTil, setPeriodeTil] = useState(todayStr());
  const [eksportMenuAaben, setEksportMenuAaben] = useState(false);
  const [saving, setSaving] = useState(false);

  // Load restaurants and user role on mount
  useEffect(() => {
    (async () => {
      // Load roles for current user
      const { data: roller } = await db.from('bruger_roller').select('*').eq('user_id', session.user.id);
      if (roller && roller.length > 0) {
        const erAdmin = roller.some(r => r.rolle === 'admin' && r.restaurant_id === null);
        if (erAdmin) {
          setBrugerRolle('admin');
          setAdgangRestIds(null); // adgang til alle
        } else {
          setBrugerRolle('personale');
          setAdgangRestIds(roller.map(r => r.restaurant_id).filter(Boolean));
        }
      } else {
        // No roles defined — treat as admin (backward compatible for existing setups)
        setBrugerRolle('admin');
        setAdgangRestIds(null);
      }

      const { data } = await db.from('restauranter').select('*').order('navn');
      const alleRest = data || [];
      // Filter to only accessible restaurants for personale
      const tilgaengelige = adgangRestIds === null ? alleRest : alleRest.filter(r => adgangRestIds.includes(r.id));

    })();

  // Load data when restaurant changes
  useEffect(() => {
    if (!activeRestId) return;
    setLoading(true);
    dbLoadAll(activeRestId).then(data => { setRestData(data); setLoading(false); });
  }, [activeRestId]);

  // Print effect — before early returns (Rules of Hooks)
  useEffect(() => {
    if (!printView) return;
    document.body.classList.add('printing-report');
    const cleanup = () => { document.body.classList.remove('printing-report'); setPrintView(null); window.removeEventListener('afterprint', cleanup); };
    window.addEventListener('afterprint', cleanup);
    const t = setTimeout(() => window.print(), 50);
    return () => { clearTimeout(t); window.removeEventListener('afterprint', cleanup); };
  }, [printView]);

  // Close export menu on outside click
  useEffect(() => {
    if (!eksportMenuAaben) return;
    const handler = (e) => { if (!e.target.closest('.export-wrap')) setEksportMenuAaben(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [eksportMenuAaben]);

  // Dark mode body class
  useEffect(() => {
    if (darkMode) { document.body.classList.add('dark'); localStorage.setItem('darkMode', 'true'); }
    else { document.body.classList.remove('dark'); localStorage.setItem('darkMode', 'false'); }
  }, [darkMode]);

  const restNavn = (id) => (restauranter.find(r => r.id === id) || {}).navn || '';
  const vareById = (id) => restData.varer.find(v => v.id === id);
  const varerForRest = restData.varer;

  // ---- Data helpers ----
  function getOptaellingerSorted() { return [...restData.optaellinger].sort((a, b) => a.dato.localeCompare(b.dato)); }

  function getLatestCount(vareId) {
    const opts = getOptaellingerSorted();
    for (let i = opts.length - 1; i >= 0; i--) {
      const c = opts[i].counts && opts[i].counts[vareId];
      if (c !== undefined) {
        const stk = typeof c === 'object' ? c.stk : c;
        return { stk, antalPakker: typeof c === 'object' ? c.antalPakker : undefined, antalLoese: typeof c === 'object' ? c.antalLoese : undefined, dato: opts[i].dato };
      }
    }
    return null;
  }

  function computeForbrug() {
    const opts = getOptaellingerSorted();
    const result = {};
    varerForRest.forEach(it => {
      const relevantOpts = opts.filter(o => o.counts && o.counts[it.id] !== undefined);
      if (relevantOpts.length < 2) { result[it.id] = null; return; }
      const prev = relevantOpts[relevantOpts.length - 2];
      const last = relevantOpts[relevantOpts.length - 1];
      const leveret = restData.leverancer.filter(l => l.vare_id === it.id && l.dato > prev.dato && l.dato <= last.dato).reduce((s, l) => s + l.antal_stk, 0);
      const spildTotal = restData.spild.filter(sp => sp.vare_id === it.id && sp.dato > prev.dato && sp.dato <= last.dato).reduce((s, sp) => s + sp.antal_stk, 0);
      const prevVal = typeof prev.counts[it.id] === 'object' ? prev.counts[it.id].stk : prev.counts[it.id];
      const lastVal = typeof last.counts[it.id] === 'object' ? last.counts[it.id].stk : last.counts[it.id];
      const forbrugTotal = prevVal + leveret - lastVal;
      const solgt = forbrugTotal - spildTotal;
      const dage = Math.max(1, Math.round((new Date(last.dato) - new Date(prev.dato)) / 86400000));
      result[it.id] = { forbrugTotal, solgt, spild: spildTotal, leveret, fra: prev.dato, til: last.dato, dage, perDag: +(solgt / dage).toFixed(2) };
    });
    return result;
  }

  function computeMaanedsForbrug() {
    const opts = getOptaellingerSorted();
    const perVare = {}, alleMaaneder = new Set();
    varerForRest.forEach(it => {
      perVare[it.id] = {};
      const relevantOpts = opts.filter(o => o.counts && o.counts[it.id] !== undefined);
      for (let i = 1; i < relevantOpts.length; i++) {
        const prev = relevantOpts[i - 1], last = relevantOpts[i];
        const leveret = restData.leverancer.filter(l => l.vare_id === it.id && l.dato > prev.dato && l.dato <= last.dato).reduce((s, l) => s + l.antal_stk, 0);
        const spildTotal = restData.spild.filter(sp => sp.vare_id === it.id && sp.dato > prev.dato && sp.dato <= last.dato).reduce((s, sp) => s + sp.antal_stk, 0);
        const prevVal = typeof prev.counts[it.id] === 'object' ? prev.counts[it.id].stk : prev.counts[it.id];
        const lastVal = typeof last.counts[it.id] === 'object' ? last.counts[it.id].stk : last.counts[it.id];
        const solgt = (prevVal + leveret - lastVal) - spildTotal;
        const maanedKey = last.dato.slice(0, 7);
        alleMaaneder.add(maanedKey);
        perVare[it.id][maanedKey] = (perVare[it.id][maanedKey] || 0) + solgt;
      }
    });
    return { perVare, maaneder: Array.from(alleMaaneder).sort() };
  }

  function vurderLagerstatus(latest, forbrugEntry, vare) {
    if (!latest) return null;
    // Check minimum threshold first (hard floor, if set)
    if (vare && vare.minimum !== null && vare.minimum !== undefined) {
      if (latest.stk <= 0) return { dageTilbage: 0, niveau: 'crit', grund: 'tom' };
      if (latest.stk < vare.minimum) return { dageTilbage: null, niveau: 'crit', grund: 'under-min', minimum: vare.minimum };
      if (latest.stk < vare.minimum * 1.5) return { dageTilbage: null, niveau: 'low', grund: 'naer-min', minimum: vare.minimum };
    }
    // Soft estimate based on consumption rate
    if (!forbrugEntry || !forbrugEntry.perDag || forbrugEntry.perDag <= 0) return null;
    const dageTilbage = latest.stk / forbrugEntry.perDag;
    const niveau = dageTilbage < 7 ? 'crit' : dageTilbage < 14 ? 'low' : 'good';
    return { dageTilbage: Math.round(dageTilbage), niveau, grund: 'forbrug' };
  }

  function getOptaellingsStatus() {
    const opts = getOptaellingerSorted();
    if (opts.length === 0) return { aldrigTalt: true, dage: null };
    const sidst = opts[opts.length - 1];
    return { aldrigTalt: false, dage: daysSince(sidst.dato), dato: sidst.dato };
  }

  // ---- Supabase mutations ----
  async function opslaaStregkode(kode) {
    setScannerAaben(false);
    setModal(prev => ({ ...prev, scanning: true, scanFejl: '', scanOk: '' }));
    try {
      const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${kode}.json`);
      const data = await res.json();
      if (data.status === 1 && data.product) {
        const p = data.product;
        const navn = p.product_name_da || p.product_name || p.abbreviated_product_name || '';
        const brands = p.brands || '';
        const kategori = p.categories_tags?.[0]?.replace('en:', '').replace(/-/g, ' ') || '';
        const fulgtNavn = brands && !navn.toLowerCase().includes(brands.toLowerCase()) ? `${brands} ${navn}`.trim() : navn;

        // Volumen — Open Food Facts gemmer det i quantity feltet, f.eks. "330 ml" eller "75 cl"
        let volumenMl = '';
        const qty = p.quantity || '';
        const mlMatch = qty.match(/([\d.,]+)\s*ml/i);
        const clMatch = qty.match(/([\d.,]+)\s*cl/i);
        const lMatch = qty.match(/([\d.,]+)\s*l\b/i);
        if (mlMatch) volumenMl = String(parseFloat(mlMatch[1].replace(',', '.')));
        else if (clMatch) volumenMl = String(parseFloat(clMatch[1].replace(',', '.')) * 10);
        else if (lMatch) volumenMl = String(parseFloat(lMatch[1].replace(',', '.')) * 1000);

        setModal(prev => ({
          ...prev,
          navn: fulgtNavn || prev.navn,
          kategori: kategoriFraOpenFood(kategori) || prev.kategori,
          volumenMl: volumenMl || prev.volumenMl || '',
          scanning: false,
          scanOk: `Fundet: ${fulgtNavn || navn}${volumenMl ? ` (${volumenMl}ml)` : ''}`,
        }));
        return;
      }
    } catch(e) {}
    setModal(prev => ({ ...prev, scanning: false, scanFejl: `Produkt ikke fundet (kode: ${kode}). Udfyld navn manuelt.` }));
  }

  function kategoriFraOpenFood(kategori) {
    const k = (kategori || '').toLowerCase();
    if (k.includes('beer') || k.includes('øl') || k.includes('lager')) return 'Øl';
    if (k.includes('wine') || k.includes('vin')) return 'Vin';
    if (k.includes('spirit') || k.includes('liquor') || k.includes('whisky') || k.includes('vodka') || k.includes('rom')) return 'Spiritus';
    if (k.includes('water') || k.includes('vand')) return 'Vand';
    if (k.includes('soft') || k.includes('soda') || k.includes('juice') || k.includes('cola') || k.includes('sodavand')) return 'Sodavand';
    if (k.includes('coffee') || k.includes('kaffe')) return 'Kaffe';
    if (k.includes('tea') || k.includes('te')) return 'Te';
    return '';
  }

  // ---- Modal handlers ----
  function openAddRest() { setModal({ type: 'rest-add', navn: '' }); }
  function openEditRest(r) { setModal({ type: 'rest-edit', id: r.id, navn: r.navn }); }

  function openAddItem() { setModal({ type: 'vare-add', navn: '', kategori: '', enhed: 'stk', brugPakke: false, pakkeStr: '', pakkeAntal: '', note: '', minimum: '', volumenMl: '', indkoebspris: '' }); }
  function openEditItem(it) { setModal({ type: 'vare-edit', item: { ...it }, brugPakke: harPakke(it) }); }
  function openBulkAdd() { setModal({ type: 'vare-bulk', tekst: '', fejl: '' }); }
  function openKopierVarer(fraRestId) { setModal({ type: 'vare-kopier', fraRestId, tilRestId: activeRestId }); }

  const autoHvem = session?.user?.email?.split('@')[0] || '';
  const erAdmin = brugerRolle === 'admin';

  function openAddDelivery(it) {
    setModal({ type: 'levering', vareId: it ? it.id : (varerForRest[0]?.id || ''), antalPakker: '', antalLoese: '', dato: todayStr(), note: '', hvem: autoHvem });
  }
  function openAddSpild(it) {
    setModal({ type: 'spild', vareId: it ? it.id : (varerForRest[0]?.id || ''), antalPakker: '', antalLoese: '', dato: todayStr(), note: '', hvem: autoHvem });
  }
  function openNewOptaelling() {
    const counts = {};
    varerForRest.forEach(it => { counts[it.id] = { pakker: '', loese: '' }; });
    setModal({ type: 'optaelling', dato: todayStr(), counts, note: '', hvem: autoHvem, redigerId: null, kunManglende: false, lukkedeKategorier: {} });
  }
  function openEditOptaelling(entry) {
    const counts = {};
    varerForRest.forEach(it => {
      const c = entry.counts?.[it.id];
      if (c === undefined) counts[it.id] = { pakker: '', loese: '' };
      else if (typeof c === 'object') counts[it.id] = { pakker: c.antalPakker ? String(c.antalPakker) : '', loese: c.antalLoese !== undefined ? String(c.antalLoese) : '' };
      else counts[it.id] = { pakker: '', loese: String(c) };
    });
    setModal({ type: 'optaelling', dato: entry.dato, counts, note: entry.note || '', hvem: entry.hvem || autoHvem, redigerId: entry.id, kunManglende: false, lukkedeKategorier: {} });
  }
  function openPosIndsaet() { setModal({ type: 'pos-indsaet', trin: 'indtast', raaTekst: '', dato: todayStr(), matchede: [] }); }
  function openHistoryDetail(entry, typeLabel) { setModal({ type: 'historik-detalje', entry, typeLabel }); }

  // ---- Submit handlers ----
  async function submitAddRest() {
    if (!modal.navn.trim()) return;
    await addRestaurant(modal.navn.trim());
    setModal(null);
  }
  async function submitEditRest() {
    if (!modal.navn.trim()) return;
    await updateRestaurant(modal.id, modal.navn.trim());
    setModal(null);
  }
  async function handleDeleteRest(r) {
    if (restauranter.length <= 1) { alert('Du skal have mindst én restaurant.'); return; }
    if (!confirm(`Slet "${r.navn}"? Al data for denne restaurant slettes. Kan ikke fortrydes.`)) return;
    await deleteRestaurant(r.id);
    setModal(null);
  }

  async function submitAddItem() {
    if (!modal.navn.trim()) return;
    await addVare({
      navn: modal.navn.trim(), kategori: modal.kategori.trim() || 'Andet', enhed: modal.enhed || 'stk',
      pakke_str: modal.brugPakke ? (modal.pakkeStr.trim() || 'ramme') : '',
      pakke_antal: modal.brugPakke ? (parseFloat(modal.pakkeAntal) || null) : null,
      note: modal.note || '', minimum: modal.minimum !== '' ? parseFloat(modal.minimum) || null : null,
      volumen_ml: modal.volumenMl !== '' ? parseFloat(modal.volumenMl) || null : null,
      indkoebspris: modal.indkoebspris !== '' ? parseFloat(modal.indkoebspris) || null : null,
    });
    setModal(null);
  }
  async function submitEditItem() {
    const it = { ...modal.item };
    if (!modal.brugPakke) { it.pakke_str = ''; it.pakke_antal = null; } else { it.pakke_antal = parseFloat(it.pakke_antal) || null; }
    it.minimum = it.minimum !== '' && it.minimum !== null && it.minimum !== undefined ? parseFloat(it.minimum) || null : null;
    it.volumen_ml = it.volumen_ml !== '' && it.volumen_ml !== null && it.volumen_ml !== undefined ? parseFloat(it.volumen_ml) || null : null;
    it.indkoebspris = it.indkoebspris !== '' && it.indkoebspris !== null && it.indkoebspris !== undefined ? parseFloat(it.indkoebspris) || null : null;
    await updateVare(it.id, { navn: it.navn, kategori: it.kategori, enhed: it.enhed, pakke_str: it.pakke_str, pakke_antal: it.pakke_antal, note: it.note || '', minimum: it.minimum, volumen_ml: it.volumen_ml, indkoebspris: it.indkoebspris });
    setModal(null);
  }
  async function handleDeleteItem(it) {
    if (!confirm(`Fjern "${it.navn}"?`)) return;
    await deleteVare(it.id);
  }

  async function submitBulkAdd() {
    // Format per linje: "Navn, Kategori, Enhed" — kategori og enhed er valgfrie
    const linjer = modal.tekst.split('\n').map(l => l.trim()).filter(Boolean);
    if (!linjer.length) return;
    const varer = linjer.map(l => {
      const dele = l.split(',').map(s => s.trim());
      return { navn: dele[0] || '', kategori: dele[1] || 'Andet', enhed: dele[2] || 'stk', pakke_str: '', pakke_antal: null, note: '', minimum: null };
    }).filter(v => v.navn);
    if (!varer.length) { setModal({ ...modal, fejl: 'Ingen gyldige varer fundet — tjek formatet.' }); return; }
    setSaving(true);
    for (const v of varer) {
      await supabase.from('varer').insert({ ...v, restaurant_id: activeRestId });
    }
    await reloadData();
    setSaving(false);
    setModal(null);
  }

  async function submitKopierVarer() {
    const kildeVarer = (await supabase.from('varer').select('*').eq('restaurant_id', modal.fraRestId)).data || [];
    if (!kildeVarer.length) { alert('Ingen varer at kopiere fra den valgte restaurant.'); return; }
    setSaving(true);
    for (const v of kildeVarer) {
      const { id, restaurant_id, created_at, ...rest } = v;
      await supabase.from('varer').insert({ ...rest, restaurant_id: activeRestId });
    }
    await reloadData();
    setSaving(false);
    setModal(null);
  }

  async function submitLevering() {
    const vare = vareById(modal.vareId);
    const antalStk = harPakke(vare)
      ? toStkCombo(vare, modal.antalPakker, modal.antalLoese)
      : parseFloat(modal.antalLoese) || 0;
    if (!antalStk || antalStk <= 0) { alert('Indtast et antal større end 0.'); return; }
    await addLevering({ vare_id: modal.vareId, antal_stk: antalStk, antal_pakker: parseFloat(modal.antalPakker) || 0, antal_loese: parseFloat(modal.antalLoese) || 0, dato: modal.dato || todayStr(), note: modal.note, hvem: modal.hvem || '' });
    setModal(null);
  }
  async function submitSpildEntry() {
    const vare = vareById(modal.vareId);
    const antalStk = harPakke(vare)
      ? toStkCombo(vare, modal.antalPakker, modal.antalLoese)
      : parseFloat(modal.antalLoese) || 0;
    if (!antalStk || antalStk <= 0) { alert('Indtast et antal større end 0.'); return; }
    await addSpild({ vare_id: modal.vareId, antal_stk: antalStk, antal_pakker: parseFloat(modal.antalPakker) || 0, antal_loese: parseFloat(modal.antalLoese) || 0, dato: modal.dato || todayStr(), note: modal.note, hvem: modal.hvem || '' });
    setModal(null);
  }
  async function submitOptaelling() {
    const counts = {};
    let any = false;
    varerForRest.forEach(it => {
      const c = modal.counts[it.id] || {};
      if ((c.pakker !== '' && c.pakker !== undefined) || (c.loese !== '' && c.loese !== undefined)) {
        const stk = toStkCombo(it, c.pakker, c.loese);
        if (stk !== null) { counts[it.id] = { stk, antalPakker: parseFloat(c.pakker) || 0, antalLoese: parseFloat(c.loese) || 0 }; any = true; }
      }
    });
    if (!any) { alert('Indtast mindst ét antal.'); return; }
    if (modal.redigerId) {
      await updateOptaelling(modal.redigerId, { dato: modal.dato || todayStr(), counts, note: modal.note, hvem: modal.hvem || '' });
    } else {
      await addOptaelling({ dato: modal.dato || todayStr(), counts, note: modal.note, hvem: modal.hvem || '' });
    }
    setModal(null);
  }
  async function handleDeleteOptaelling(entry) {
    if (!confirm(`Slet optællingen fra ${fmtDateShort(entry.dato)}? Kan påvirke forbrugsberegninger.`)) return;
    await deleteOptaelling(entry.id);
    setModal(null);
  }
  function tolkPosTekst() {
    const linjer = parsePosTekst(modal.raaTekst);
    if (!linjer.length) { alert('Kunne ikke genkende nogen linjer med både navn og antal.'); return; }
    setModal({ ...modal, trin: 'bekraeft', matchede: matchPosLinjer(linjer, varerForRest) });
  }
  async function submitPosTal() {
    const gyldige = modal.matchede.filter(m => m.vareId);
    if (!gyldige.length) { alert('Ingen linjer er tilknyttet en vare.'); return; }
    await addPosTal(gyldige.map(m => ({ vare_id: m.vareId, antal: m.antal, raa_navn: m.raaNavn, dato: modal.dato || todayStr() })));
    setModal(null);
  }

  function printRapport(view) { setPrintView(view); }
  function doPrint() { window.print(); }

  // ---- Export ----
  function eksporterAlt() {
    const forbrug = computeForbrug();
    const raekker = [['Vare','Kategori','Enhed','Pakke','Styk pr. pakke','Senest talt (stk)','Senest talt dato','Solgt siden sidst','Spild siden sidst','Pr. dag']];
    varerForRest.forEach(it => {
      const latest = getLatestCount(it.id), f = forbrug[it.id];
      raekker.push([it.navn, it.kategori, it.enhed, it.pakke_str || '', it.pakke_antal || '', latest ? latest.stk : '', latest ? latest.dato : '', f ? f.solgt : '', f ? f.spild : '', f ? f.perDag : '']);
    });
    downloadCSV(`lageroversigt_${restNavn(activeRestId)}_${todayStr()}.csv`, raekker);
  }
  function eksporterOptaellinger() {
    const raekker = [['Dato','Vare','Kategori','Antal (stk)','Antal rammer','Antal løse','Hvem','Note']];
    restData.optaellinger.forEach(o => {
      Object.entries(o.counts || {}).forEach(([vid, c]) => {
        const it = vareById(vid);
        const stk = typeof c === 'object' ? c.stk : c;
        raekker.push([o.dato, it?.navn || '', it?.kategori || '', stk, typeof c === 'object' ? c.antalPakker : '', typeof c === 'object' ? c.antalLoese : '', o.hvem || '', o.note || '']);
      });
    });
    downloadCSV(`optaellinger_${restNavn(activeRestId)}_${todayStr()}.csv`, raekker);
  }
  function eksporterLeverancer() {
    const raekker = [['Dato','Vare','Kategori','Antal (stk)','Antal rammer','Antal løse','Hvem','Note']];
    restData.leverancer.forEach(l => { const it = vareById(l.vare_id); raekker.push([l.dato, it?.navn || '', it?.kategori || '', l.antal_stk, l.antal_pakker || 0, l.antal_loese || 0, l.hvem || '', l.note || '']); });
    downloadCSV(`leverancer_${restNavn(activeRestId)}_${todayStr()}.csv`, raekker);
  }
  function eksporterSpild() {
    const raekker = [['Dato','Vare','Kategori','Antal (stk)','Antal rammer','Antal løse','Hvem','Årsag']];
    restData.spild.forEach(sp => { const it = vareById(sp.vare_id); raekker.push([sp.dato, it?.navn || '', it?.kategori || '', sp.antal_stk, sp.antal_pakker || 0, sp.antal_loese || 0, sp.hvem || '', sp.note || '']); });
    downloadCSV(`spild_${restNavn(activeRestId)}_${todayStr()}.csv`, raekker);
  }
  function eksporterPosTalCSV() {
    const raekker = [['Dato','Vare','Antal solgt','Tekst fra POS']];
    restData.posTal.forEach(p => { const it = vareById(p.vare_id); raekker.push([p.dato, it?.navn || '', p.antal, p.raa_navn]); });
    downloadCSV(`pos_salg_${restNavn(activeRestId)}_${todayStr()}.csv`, raekker);
  }

  // ---- Print report renderers ----
  function renderPrintOptaelling(entry) {
    return (
      <div>
        <div className="print-report-head">
          <h1>Optælling — {restNavn(activeRestId)}</h1>
          <div className="print-report-meta">Dato: {fmtDateShort(entry.dato)}{entry.hvem ? ` · Talt af: ${entry.hvem}` : ''} · Udskrevet {fmtDateTime(nowISO())}</div>
          {entry.note && <div className="print-report-meta">Note: {entry.note}</div>}

        <table>
          <thead><tr><th>Vare</th><th>Kategori</th><th className="num">Talt antal</th></tr></thead>

              return <tr key={vid}><td>{it?.navn || '(slettet)'}</td><td className="item-cat">{it?.kategori || ''}</td><td className="num">{stk} {it?.enhed || ''}{detalje && it?.pakke_antal ? ` (${detalje})` : ''}</td></tr>;
            })}
          </tbody>
        </table>
      </div>
    );
  }
  function renderPrintPeriode(fra, til) {
    const lev = restData.leverancer.filter(l => l.dato >= fra && l.dato <= til);
    const spild = restData.spild.filter(sp => sp.dato >= fra && sp.dato <= til);
    const opts = restData.optaellinger.filter(o => o.dato >= fra && o.dato <= til);
    const posTal = restData.posTal.filter(p => p.dato >= fra && p.dato <= til);
    const sumPrVare = (entries, field) => { const s = {}; entries.forEach(e => { s[e.vare_id] = (s[e.vare_id] || 0) + e[field]; }); return s; };
    const levSum = sumPrVare(lev, 'antal_stk'), spildSum = sumPrVare(spild, 'antal_stk'), posSum = {};
    posTal.forEach(p => { posSum[p.vare_id] = (posSum[p.vare_id] || 0) + p.antal; });
    const alleIds = new Set([...Object.keys(levSum), ...Object.keys(spildSum), ...Object.keys(posSum)]);
    return (
      <div>
        <div className="print-report-head">
          <h1>Periode-rapport — {restNavn(activeRestId)}</h1>
          <div className="print-report-meta">{fmtDateShort(fra)} – {fmtDateShort(til)} · Udskrevet {fmtDateTime(nowISO())}</div>
        </div>
        <div className="print-report-section-title">Leverancer &amp; spild</div>
        {alleIds.size === 0 ? <div className="print-report-empty">Ingen data i denne periode.</div> : (
          <table>
            <thead><tr><th>Vare</th><th className="num">Leveret</th><th className="num">Spild</th><th className="num">POS-salg</th></tr></thead>
            <tbody>
              {Array.from(alleIds).map(vid => {
                const it = vareById(vid);
                return <tr key={vid}><td>{it?.navn || '(slettet)'}</td><td className="num">{levSum[vid] !== undefined ? `${levSum[vid]} ${it?.enhed || ''}` : '—'}</td><td className="num">{spildSum[vid] !== undefined ? `${spildSum[vid]} ${it?.enhed || ''}` : '—'}</td><td className="num">{posSum[vid] !== undefined ? `${posSum[vid]} ${it?.enhed || ''}` : '—'}</td></tr>;
              })}
            </tbody>
          </table>
        )}
        <div className="print-report-section-title">Optællinger</div>
        {opts.length === 0 ? <div className="print-report-empty">Ingen optællinger i denne periode.</div> : opts.map(o => (
          <div key={o.id} style={{ marginBottom: 14 }}>
            <div style={{ fontWeight: 700, marginBottom: 4 }}>{fmtDateShort(o.dato)}{o.hvem ? ` — ${o.hvem}` : ''}</div>
            <table><thead><tr><th>Vare</th><th className="num">Talt antal</th></tr></thead><tbody>
              {Object.entries(o.counts || {}).map(([vid, c]) => {
                const it = vareById(vid);
                const stk = typeof c === 'object' ? c.stk : c;
                return <tr key={vid}><td>{it?.navn || '(slettet)'}</td><td className="num">{stk} {it?.enhed || ''}</td></tr>;
              })}
            </tbody></table>
          </div>
        ))}
      </div>
    );
  }

  // ---- PakkeInput component ----
  function PakkeInput({ vare, pakker, loese, onChangePakker, onChangeLoese }) {
    if (!harPakke(vare)) return null;
    const total = toStkCombo(vare, pakker, loese);
    return (
      <div className="field-row" style={{ marginBottom: 0 }}>
        <div className="field"><label>Antal {vare.pakke_str}</label><input type="number" min="0" step="any" value={pakker} onChange={e => onChangePakker(e.target.value)} placeholder="0" /></div>
        <div className="field"><label>Antal løse {vare.enhed}</label><input type="number" min="0" step="any" value={loese} onChange={e => onChangeLoese(e.target.value)} placeholder="0" /></div>

  const forbrug = computeForbrug();
  const optStatus = getOptaellingsStatus();

  function renderGlobalSoeg() {
    const q = globalSoeg.toLowerCase().trim();
    if (!q) return null;
    // Search across all restaurants' varer (we only have current restaurant's data loaded)
    // Show current restaurant results + note about others
    const resultater = varerForRest
      .filter(it => it.navn.toLowerCase().includes(q) || it.kategori.toLowerCase().includes(q) || (it.note || '').toLowerCase().includes(q))
      .map(it => ({ ...it, restNavn: restNavn(activeRestId), restId: activeRestId }));

    return (
      <div>
        <div className="section-title">Søgeresultater for "{globalSoeg}"</div>
        <div className="compare-empty-note" style={{ marginBottom: 14 }}>
          Søger i den aktuelle restaurant ({restNavn(activeRestId)}). Skift restaurant i navigationen for at søge i andre.
        </div>

          <div className="empty-state"><div className="display">Ingen resultater</div><div>Prøv et andet søgeord.</div></div>

                    <td className="item-cat">{it.kategori}</td>
                    <td className="item-cat">{it.restNavn}</td>
                    <td className="num">{latest ? `${latest.stk} ${it.enhed}` : <span className="item-cat">ikke talt</span>}</td>
                    <td className="num">{status ? <span className={`tag ${status.niveau}`}>{status.grund === 'under-min' ? 'Under min.' : status.grund === 'naer-min' ? 'Nær min.' : `~${status.dageTilbage}d`}</span> : <span className="item-cat">—</span>}</td>
                    <td className="no-print"><button className="btn small ghost" onClick={e => { e.stopPropagation(); setActiveRestId(it.restId); setView('lager'); setSearch(it.navn); setGlobalSoeg(''); }}>Gå til →</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
    );
  }

  function renderDashboard() {
    // Compute status for all restaurants using current restData (active restaurant only)
    // For the active restaurant we have full data; others show basic info
    const forbrug = computeForbrug();
    const optStatus = getOptaellingsStatus();

    // Count critical/low for active restaurant
    const kritiskeVarer = varerForRest.filter(it => {
      const latest = getLatestCount(it.id);
      const f = forbrug[it.id];
      const status = vurderLagerstatus(latest, f, it);
      return status && status.niveau === 'crit';
    });
    const laveVarer = varerForRest.filter(it => {
      const latest = getLatestCount(it.id);
      const f = forbrug[it.id];
      const status = vurderLagerstatus(latest, f, it);
      return status && status.niveau === 'low';
    });

    const PAAMINDELSESDAGE = 14;

    return (
      <div>
        <div className="section-title">Dashboard</div>

        {/* Summary strip for active restaurant */}
        <div className="dash-summary">
          <div className="dash-summary-cell">
            <div className={`dash-summary-num ${kritiskeVarer.length > 0 ? 'crit' : ''}`}>{kritiskeVarer.length}</div>
            <div className="dash-summary-label">Kritiske varer</div>
          </div>
          <div className="dash-summary-cell">
            <div className={`dash-summary-num ${laveVarer.length > 0 ? 'low' : ''}`}>{laveVarer.length}</div>
            <div className="dash-summary-label">Lav beholdning</div>
          </div>
          <div className="dash-summary-cell">
            <div className="dash-summary-num">{varerForRest.length}</div>
            <div className="dash-summary-label">Varer i alt</div>
          </div>
          <div className="dash-summary-cell">
            <div className={`dash-summary-num ${optStatus.aldrigTalt || optStatus.dage >= PAAMINDELSESDAGE ? 'low' : ''}`}>
              {optStatus.aldrigTalt ? '—' : `${optStatus.dage}d`}
            </div>
            <div className="dash-summary-label">Siden optælling</div>
          </div>
        </div>

        {/* Restaurant cards */}
        <div className="dashboard-grid">
          {restauranter.map(r => {
            const erAktiv = r.id === activeRestId;
            const kritiske = erAktiv ? kritiskeVarer : [];
            const lave = erAktiv ? laveVarer : [];
            const status = kritiske.length > 0 ? 'crit' : lave.length > 0 ? 'low' : 'good';
            return (
              <div className="dash-card" key={r.id} onClick={() => { setActiveRestId(r.id); setView('lager'); }}>
                <div className="dash-card-top">
                  <div className="dash-card-name">{r.navn}</div>
                  <span className={`tag ${status}`}>
                    {status === 'crit' ? `${kritiske.length} kritisk` : status === 'low' ? `${lave.length} lav` : 'OK'}
                  </span>
                </div>
                <div className="dash-card-stats">
                  <span><b>{erAktiv ? varerForRest.length : '…'}</b> varer</span>
                  {erAktiv && optStatus.aldrigTalt && <span style={{ color: 'var(--low)' }}>Aldrig talt</span>}
                  {erAktiv && !optStatus.aldrigTalt && <span>Sidst talt <b>{optStatus.dage}d</b> siden</span>}
                </div>
                {erAktiv && kritiske.length > 0 && (
                  <div className="dash-card-kritisk">
                    Kritisk: {kritiske.slice(0, 4).map(it => <span key={it.id}>{it.navn}</span>)}
                    {kritiske.length > 4 && <span>+{kritiske.length - 4} mere</span>}
                  </div>
                )}
                <div className="dash-card-actions" onClick={e => e.stopPropagation()}>
                  <button className="dash-quick-btn" onClick={() => { setActiveRestId(r.id); setView('lager'); }}>Lager</button>
                  <button className="dash-quick-btn" onClick={() => { setActiveRestId(r.id); setView('mobil-optaelling'); }}>📋 Hurtig optælling</button>
                  <button className="dash-quick-btn" onClick={() => { setActiveRestId(r.id); openNewOptaelling(); }}>+ Optælling</button>
                  <button className="dash-quick-btn" onClick={() => { setActiveRestId(r.id); openAddDelivery(null); }}>+ Levering</button>
                </div>
              </div>
            );
          })}
          <div className="dash-card" style={{ borderStyle: 'dashed', cursor: 'pointer' }} onClick={openAddRest}>
            <div style={{ textAlign: 'center', padding: '20px 0', color: 'var(--ink-soft)' }}>
              <div style={{ fontSize: 24, marginBottom: 6 }}>+</div>
              <div style={{ fontSize: 13 }}>Tilføj restaurant</div>
            </div>
          </div>
        </div>

        {/* Recent activity from active restaurant */}
        <div className="print-report-section-title">Seneste aktivitet — {restNavn(activeRestId)}</div>
        {restData.optaellinger.length === 0 && restData.leverancer.length === 0 ? (
          <div className="compare-empty-note">Ingen aktivitet endnu.</div>
        ) : (
          <div className="history-list">
            {[
              ...restData.optaellinger.map(o => ({ ...o, _type: 'optaelling' })),
              ...restData.leverancer.map(l => ({ ...l, _type: 'levering' })),
            ].sort((a, b) => (b.dato + (b.oprettet || '')).localeCompare(a.dato + (a.oprettet || '')))
             .slice(0, 8)
             .map(e => {
              const vare = e._type !== 'optaelling' ? vareById(e.vare_id) : null;
              const typeLabel = e._type === 'optaelling' ? 'Optælling' : 'Levering';
              return (
                <div className="history-row" key={e._type + e.id} onClick={() => setView('historik')}>
                  <span className="history-date">{fmtDateShort(e.dato)}</span>
                  <span className={`history-type ${e._type}`}>{typeLabel}</span>
                  <span style={{ flex: 1 }}>
                    {e._type === 'optaelling'
                      ? `${Object.keys(e.counts || {}).length} varer talt${e.note ? ' — ' + e.note : ''}`
                      : `${fmtPakkeLoese(vare, e.antal_pakker, e.antal_loese)} ${vare?.navn || ''}${e.note ? ' — ' + e.note : ''}`}
                  </span>
                  {e.hvem && <span className="history-who">{e.hvem}</span>}
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  function renderMobilOptaelling() {
    return <MobilOptaelling

      restNavn={restNavn}
      harPakke={harPakke}
      toStkCombo={toStkCombo}

  function renderLager() {
    const items = varerForRest.filter(it => !search || it.navn.toLowerCase().includes(search.toLowerCase()) || it.kategori.toLowerCase().includes(search.toLowerCase()));
    return (
      <div>
        {varerForRest.length > 0 && (optStatus.aldrigTalt || optStatus.dage >= PAAMINDELSESDAGE) && (
          <div className="banner reminder">
            {optStatus.aldrigTalt ? '⚠ Der er ikke lavet nogen optælling på denne restaurant endnu.' : `⚠ Sidst talt for ${optStatus.dage} dage siden (${fmtDateShort(optStatus.dato)}). Overvej en ny optælling.`}
          </div>
        )}
        <div className="toolbar no-print">
          <input className="search-box" placeholder="Søg vare eller kategori…" value={search} onChange={e => setSearch(e.target.value)} />

            <button className="btn ghost" onClick={openAddItem}>+ Tilføj vare</button>
            <button className="btn ghost" onClick={openBulkAdd}>+ Tilføj mange</button>
            {restauranter.length > 1 && <button className="btn ghost" onClick={() => openKopierVarer(restauranter.find(r => r.id !== activeRestId)?.id)}>Kopiér fra anden restaurant</button>}

            <button className="btn ghost" onClick={() => openAddSpild(null)}>+ Spild</button>
            <button className="btn ghost" onClick={openPosIndsaet}>+ Salgstal fra POS</button>
            <button className="btn rust" onClick={openNewOptaelling}>Ny optælling</button>
          </div>
        </div>
        {items.length === 0 ? (
          <div className="empty-state"><div className="display">Ingen varer endnu</div><div>Tilføj din første vare for at komme i gang.</div></div>
        ) : (
          <table className="lager-table">
            <thead><tr>
              <th>Vare</th><th>Kategori</th><th className="num">Senest talt</th>
              <th className="num">Status</th><th className="num">Solgt siden sidst</th>
              <th className="num">Spild</th><th className="num">Pr. dag</th><th className="no-print"></th>
            </tr></thead>
            <tbody>
              {items.map(it => {
                const latest = getLatestCount(it.id);
                const f = forbrug[it.id];
                return (
                  <tr key={it.id}>
                    <td>
                      <div className="item-name">{it.navn}</div>
                      <div className="item-cat">
                        {it.enhed}
                        {harPakke(it) ? ` · 1 ${it.pakke_str} = ${it.pakke_antal} ${it.enhed}` : ''}
                        {it.volumen_ml ? ` · ${it.volumen_ml >= 1000 ? (it.volumen_ml/1000).toFixed(1) + 'L' : it.volumen_ml + 'ml'}` : ''}
                        {it.indkoebspris ? ` · ${it.indkoebspris.toFixed(2)} kr` : ''}
                      </div>
                      {it.note && <div className="item-cat" style={{ fontStyle: 'italic' }}>{it.note}</div>}
                    </td>
                    <td className="item-cat">{it.kategori}</td>
                    <td className="num">
                      {latest ? (harPakke(it) && latest.antalPakker !== undefined ? (
                        <><div>{fmtPakkeLoese(it, latest.antalPakker, latest.antalLoese)}</div><div className="item-cat">= {latest.stk} {it.enhed}</div></>
                      ) : `${latest.stk} ${it.enhed}`) : <span className="item-cat">ikke talt</span>}
                    </td>
                    <td className="num">{(() => {
                        const status = vurderLagerstatus(latest, f, it);
                        if (!status) return <span className="item-cat">—</span>;
                        if (status.grund === 'tom') return <span className="tag crit">Tom</span>;
                        if (status.grund === 'under-min') return <span className="tag crit">Under min. ({status.minimum} {it.enhed})</span>;
                        if (status.grund === 'naer-min') return <span className="tag low">Nær min. ({status.minimum} {it.enhed})</span>;
                        return <span className={`tag ${status.niveau}`}>~{status.dageTilbage} dage</span>;
                      })()}</td>

                    <td className="num">{f ? <span className="item-cat">{f.perDag}/dag</span> : <span className="item-cat">—</span>}</td>
                    <td className="no-print">
                      <div className="row-actions">
                        <button className="icon-btn" title="Levering" onClick={() => openAddDelivery(it)}>+</button>
                        <button className="icon-btn" title="Spild" onClick={() => openAddSpild(it)}>⚠</button>
                        {erAdmin && <button className="icon-btn" title="Redigér" onClick={() => openEditItem(it)}>✎</button>}
                        {erAdmin && <button className="icon-btn" title="Fjern" onClick={() => handleDeleteItem(it)}>×</button>}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
    );
  }

                  <span style={{ flex: 1 }}>

                      : `${fmtPakkeLoese(vare, e.antal_pakker, e.antal_loese)} ${vare?.navn || '(slettet)'}${e.note ? ' — ' + e.note : ''}`}

  function renderSammenligning() {
    const { perVare, maaneder } = computeMaanedsForbrug();
    if (maaneder.length === 0) return <div className="empty-state"><div className="display">Ikke nok data endnu</div><div>Du skal have optællinger i mindst to måneder.</div></div>;
    return (
      <div>
        <div className="section-title">Sammenligning måned-til-måned</div>
        <div className="compare-table">
          <table>
            <thead><tr><th>Vare</th>{maaneder.map(m => <th key={m} className="month-col">{fmtMaaned(m)}</th>)}</tr></thead>
            <tbody>
              {varerForRest.map(it => {
                const rad = perVare[it.id] || {};
                const vaerdier = maaneder.map(m => rad[m]);
                return (
                  <tr key={it.id}>
                    <td><div className="item-name">{it.navn}</div><div className="item-cat">{it.enhed}</div></td>

                      const prevV = i > 0 ? vaerdier[i - 1] : undefined;
                      const trendClass = prevV !== undefined && v !== prevV ? (v > prevV ? 'compare-cell-up' : 'compare-cell-down') : '';
                      return <td key={m} className={`num month-col ${trendClass}`}>{v}</td>;
                    })}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    );
