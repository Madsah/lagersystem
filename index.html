  function renderAnalyse() {
    const FARVER = ['#C4501C','#3D7A4F','#B8842E','#1C6B8A','#8B4FB3','#B23B3B','#2E7D68','#C4881C','#4A6FA5','#7D4E3A'];
    const opts = getOptaellingerSorted();
    const forbrug = computeForbrug();
    const { perVare, maaneder } = computeMaanedsForbrug();

    // ---- Build tidspunkter (forbrug over tid) ----
    const tidspunkter = [];
    varerForRest.forEach(it => {
      const relevantOpts = opts.filter(o => o.counts && o.counts[it.id] !== undefined);
      for (let i = 1; i < relevantOpts.length; i++) {
        const prev = relevantOpts[i-1], last = relevantOpts[i];
        const leveret = restData.leverancer.filter(l => l.vare_id === it.id && l.dato > prev.dato && l.dato <= last.dato).reduce((s,l) => s+l.antal_stk, 0);
        const spildT = restData.spild.filter(sp => sp.vare_id === it.id && sp.dato > prev.dato && sp.dato <= last.dato).reduce((s,sp) => s+sp.antal_stk, 0);
        const prevVal = typeof prev.counts[it.id] === 'object' ? prev.counts[it.id].stk : prev.counts[it.id];
        const lastVal = typeof last.counts[it.id] === 'object' ? last.counts[it.id].stk : last.counts[it.id];
        const solgt = prevVal + leveret - lastVal - spildT;
        const dage = Math.max(1, Math.round((new Date(last.dato) - new Date(prev.dato)) / 86400000));
        tidspunkter.push({ dato: last.dato, vareId: it.id, navn: it.navn, solgt, perDag: +(solgt/dage).toFixed(2) });
      }
    });
    const datoer = [...new Set(tidspunkter.map(t => t.dato))].sort();

    // ---- Rangering ----
    const rangeringData = varerForRest
      .map(it => ({ navn: it.navn, enhed: it.enhed, ...forbrug[it.id] }))
      .filter(it => it.solgt !== undefined && it.solgt !== null)
      .sort((a, b) => b.solgt - a.solgt);
    const maxSolgt = rangeringData.length ? Math.max(...rangeringData.map(d => d.solgt)) : 1;

    // ---- Sæsonudsving ----
    function heatFarve(solgt, max) {
      if (!max || solgt === 0) return '#F0EFE9';
      const pct = solgt / max;
      if (pct > 0.75) return '#C4501C';
      if (pct > 0.5) return '#E8742A';
      if (pct > 0.25) return '#F5A55A';
      return '#FAD4B8';
    }
    const saesonData = varerForRest
      .map(it => ({ navn: it.navn, enhed: it.enhed, maaneder: maaneder.map(m => ({ m: fmtMaaned(m), solgt: perVare[it.id]?.[m] || 0 })) }))
      .filter(it => it.maaneder.some(m => m.solgt > 0));

    const harNokData = opts.length >= 2;

    // ---- Simple SVG line chart ----
    function SvgLinjeChart({ data, varer }) {
      if (!data.length || !varer.length) return <div className="compare-empty-note">Ikke nok datapunkter endnu.</div>;
      const W = 700, H = 280, PAD = { top: 20, right: 20, bottom: 40, left: 50 };
      const innerW = W - PAD.left - PAD.right;
      const innerH = H - PAD.top - PAD.bottom;
      // Collect all values
      const alleVaerdier = [];
      varer.forEach(it => data.forEach(d => { if (d[it.navn] !== undefined) alleVaerdier.push(d[it.navn]); }));
      if (!alleVaerdier.length) return <div className="compare-empty-note">Ingen data at vise.</div>;
      const maxY = Math.max(...alleVaerdier) * 1.1 || 1;
      const xScale = i => PAD.left + (i / (data.length - 1)) * innerW;
      const yScale = v => PAD.top + innerH - (v / maxY) * innerH;
      // Y axis ticks
      const yTicks = [0, 0.25, 0.5, 0.75, 1].map(f => ({ v: +(maxY * f).toFixed(1), y: yScale(maxY * f) }));
      return (
        <div style={{ overflowX: 'auto' }}>
          <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', maxWidth: W, fontFamily: 'IBM Plex Mono', fontSize: 10 }}>
            {/* Grid */}
            {yTicks.map((t, i) => <line key={i} x1={PAD.left} x2={W - PAD.right} y1={t.y} y2={t.y} stroke="#DEDCD3" strokeDasharray="3 3" />)}
            {/* Y axis labels */}
            {yTicks.map((t, i) => <text key={i} x={PAD.left - 6} y={t.y + 3} textAnchor="end" fill="#5C5A54">{t.v}</text>)}
            {/* X axis labels */}
            {data.map((d, i) => <text key={i} x={xScale(i)} y={H - 8} textAnchor="middle" fill="#5C5A54" fontSize={9}>{d.dato}</text>)}
            {/* Lines */}
            {varer.map((it, vi) => {
              const points = data.map((d, i) => d[it.navn] !== undefined ? [xScale(i), yScale(d[it.navn])] : null).filter(Boolean);
              if (points.length < 2) return null;
              const d = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0]} ${p[1]}`).join(' ');
              return (
                <g key={it.id}>
                  <path d={d} fill="none" stroke={FARVER[vi % FARVER.length]} strokeWidth={2} />
                  {points.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r={3} fill={FARVER[vi % FARVER.length]} />)}
                </g>
              );
            })}
          </svg>
          {/* Legend */}
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px 16px', marginTop: 8 }}>
            {varer.filter((it, vi) => data.some(d => d[it.navn] !== undefined)).map((it, vi) => (
              <span key={it.id} style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 11 }}>
                <span style={{ width: 12, height: 12, borderRadius: 2, background: FARVER[vi % FARVER.length], display: 'inline-block' }} />
                {it.navn}
              </span>
            ))}
          </div>
        </div>
      );
    }

    // Build chart data
    const linjeData = datoer.map(dato => {
      const obj = { dato: fmtDateShort(dato) };
      varerForRest.forEach(it => { const p = tidspunkter.find(t => t.dato === dato && t.vareId === it.id); if (p) obj[it.navn] = p.perDag; });
      return obj;
    });

    return (
      <div>
        <div className="section-title">Analyse</div>

        {!harNokData && (
          <div className="banner">Du skal have mindst to optællinger for at se forbrugsanalyse. Lav din første og anden optælling, så udfyldes graferne automatisk.</div>
        )}

        {harNokData && (
          <>
            {/* ---- 7: Forbrug over tid ---- */}
            <div style={{ marginBottom: 36 }}>
              <div className="print-report-section-title">Forbrug over tid (stk/dag)</div>
              <div className="compare-empty-note" style={{ marginBottom: 10 }}>Gennemsnitligt dagligt forbrug per periode mellem to optællinger.</div>
              <SvgLinjeChart data={linjeData} varer={varerForRest} />
            </div>

            {/* ---- 8: Rangering ---- */}
            <div style={{ marginBottom: 36 }}>
              <div className="print-report-section-title">Rangering — mest til mindst solgt</div>
              <div className="compare-empty-note" style={{ marginBottom: 10 }}>Baseret på seneste periode. Hover/klik for detaljer.</div>
              {rangeringData.length === 0 ? <div className="compare-empty-note">Ingen forbrugsdata endnu.</div> : (
                <div style={{ overflowX: 'auto' }}>
                  {rangeringData.map((it, i) => (
                    <div key={it.navn} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
                      <div style={{ width: 130, fontSize: 11, textAlign: 'right', color: 'var(--ink-soft)', flexShrink: 0, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }} title={it.navn}>{it.navn}</div>
                      <div style={{ flex: 1, background: 'var(--paper-dim)', borderRadius: 3, height: 22, position: 'relative', minWidth: 100 }}>
                        <div style={{ width: `${Math.max(2, (it.solgt / maxSolgt) * 100)}%`, background: FARVER[i % FARVER.length], height: '100%', borderRadius: 3, transition: 'width 0.3s' }} />
                      </div>
                      <div style={{ fontSize: 11, minWidth: 90, color: 'var(--ink)' }}><strong>{it.solgt}</strong> {it.enhed} <span style={{ color: 'var(--ink-soft)' }}>({it.perDag}/dag)</span></div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* ---- 9: Pr. dag per restaurant (denne restaurant) ---- */}
            <div style={{ marginBottom: 36 }}>
              <div className="print-report-section-title">Forbrug pr. dag — {restNavn(activeRestId)}</div>
              <div className="compare-empty-note" style={{ marginBottom: 10 }}>
                {restauranter.length <= 1 ? 'Tilføj flere restauranter under Indstillinger for at sammenligne dem mod hinanden.' : 'Fuld sammenligning på tværs af alle restauranter kommer i næste opdatering.'}
              </div>
              {rangeringData.filter(d => d.perDag > 0).length === 0 ? <div className="compare-empty-note">Ingen data.</div> : (
                <div>
                  {rangeringData.filter(d => d.perDag > 0).map((it, i) => {
                    const maxPD = Math.max(...rangeringData.filter(d => d.perDag > 0).map(d => d.perDag));
                    return (
                      <div key={it.navn} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
                        <div style={{ width: 130, fontSize: 11, textAlign: 'right', color: 'var(--ink-soft)', flexShrink: 0, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{it.navn}</div>
                        <div style={{ flex: 1, background: 'var(--paper-dim)', borderRadius: 3, height: 22, position: 'relative', minWidth: 100 }}>
                          <div style={{ width: `${Math.max(2, (it.perDag / maxPD) * 100)}%`, background: '#3D7A4F', height: '100%', borderRadius: 3 }} />
                        </div>
                        <div style={{ fontSize: 11, minWidth: 80, color: 'var(--ink)' }}><strong>{it.perDag}</strong> {it.enhed}/dag</div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* ---- 10: Sæsonudsving ---- */}
            <div style={{ marginBottom: 36 }}>
              <div className="print-report-section-title">Sæsonudsving — solgt pr. måned</div>
              <div className="compare-empty-note" style={{ marginBottom: 10 }}>Mørkere farve = højere forbrug den måned.</div>
              {maaneder.length < 2 ? (
                <div className="compare-empty-note">Kræver optællinger i mindst to måneder.</div>
              ) : saesonData.length === 0 ? (
                <div className="compare-empty-note">Ingen forbrugsdata at vise.</div>
              ) : (
                <div style={{ overflowX: 'auto' }}>
                  <table>
                    <thead>
                      <tr>
                        <th>Vare</th>
                        {maaneder.map(m => <th key={m} className="num">{fmtMaaned(m)}</th>)}
                        <th className="num">Total</th>
                      </tr>
                    </thead>
                    <tbody>
                      {saesonData.map(it => {
                        const max = Math.max(...it.maaneder.map(m => m.solgt));
                        const total = it.maaneder.reduce((s, m) => s + m.solgt, 0);
                        return (
                          <tr key={it.navn}>
                            <td className="item-name">{it.navn}</td>
                            {it.maaneder.map((m, i) => (
                              <td key={i} className="num" style={{ background: heatFarve(m.solgt, max), color: m.solgt / (max||1) > 0.5 ? 'white' : 'var(--ink)', fontWeight: m.solgt > 0 ? 600 : 400, padding: '8px 10px' }}>
                                {m.solgt > 0 ? m.solgt : '—'}
                              </td>
                            ))}
                            <td className="num" style={{ fontWeight: 700 }}>{total}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </>
        )}
      </div>
    );
  }

  // ---- Modal helpers for optaelling list ----
  function renderOptaellingListe(m) {
    const erUdfyldt = it => { const c = m.counts[it.id] || {}; return (c.pakker !== '' && c.pakker !== undefined) || (c.loese !== '' && c.loese !== undefined); };
    const antalUdfyldt = varerForRest.filter(erUdfyldt).length;
    const synlige = m.kunManglende ? varerForRest.filter(it => !erUdfyldt(it)) : varerForRest;
    const kategorier = [];
    synlige.forEach(it => { const k = it.kategori || 'Andet'; let g = kategorier.find(g => g.navn === k); if (!g) { g = { navn: k, varer: [] }; kategorier.push(g); } g.varer.push(it); });

    function gaaTilNaeste(e) {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      const alle = Array.from(document.querySelectorAll('[data-opt-input]'));
      const idx = alle.indexOf(e.target);
      if (idx >= 0 && idx < alle.length - 1) alle[idx + 1].focus();
    }

    return (
      <>
        <div className="opt-toolbar">
          <button type="button" className={`opt-filter-toggle ${m.kunManglende ? 'active' : ''}`} onClick={() => setModal({ ...m, kunManglende: !m.kunManglende })}>
            {m.kunManglende ? '✓ Viser kun manglende' : 'Vis kun manglende'}
          </button>
          <span className="opt-progress">{antalUdfyldt} / {varerForRest.length} talt</span>
        </div>
        {kategorier.length === 0 ? (
          <div className="hint">Alle varer er talt. Fjern filtret for at se dem igen.</div>
        ) : kategorier.map(gruppe => {
          const lukket = !!m.lukkedeKategorier[gruppe.navn];
          return (
            <div className="kategori-group" key={gruppe.navn}>
              <div className={`kategori-head ${lukket ? 'collapsed' : ''}`}
                onClick={() => setModal({ ...m, lukkedeKategorier: { ...m.lukkedeKategorier, [gruppe.navn]: !lukket } })}>
                <span className="chevron">▾</span><span>{gruppe.navn}</span>
                <span className="kategori-count">{gruppe.varer.filter(erUdfyldt).length}/{gruppe.varer.length}</span>
              </div>
              {!lukket && gruppe.varer.map(it => {
                const c = m.counts[it.id] || { pakker: '', loese: '' };
                return (
                  <div className={`count-row ${erUdfyldt(it) ? 'is-counted' : ''}`} key={it.id}>
                    <div className="count-row-name"><div className="item-name">{it.navn}</div><div className="item-cat">{it.enhed}</div></div>
                    {harPakke(it) ? (
                      <div className="count-pakke-group">
                        <input data-opt-input className="count-input-small" type="number" min="0" step="any" placeholder="0" value={c.pakker}
                          onKeyDown={gaaTilNaeste}
                          onChange={e => setModal({ ...m, counts: { ...m.counts, [it.id]: { ...c, pakker: e.target.value } } })} />
                        <span className="unit-label">{it.pakke_str}</span><span className="unit-label">+</span>
                        <input data-opt-input className="count-input-small" type="number" min="0" step="any" placeholder="0" value={c.loese}
                          onKeyDown={gaaTilNaeste}
                          onChange={e => setModal({ ...m, counts: { ...m.counts, [it.id]: { ...c, loese: e.target.value } } })} />
                        <span className="unit-label">løse {it.enhed}</span>
                      </div>
                    ) : (
                      <input data-opt-input className="count-input" type="number" min="0" step="any" placeholder="0" value={c.loese}
                        onKeyDown={gaaTilNaeste}
                        onChange={e => setModal({ ...m, counts: { ...m.counts, [it.id]: { ...c, loese: e.target.value } } })} />
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}
      </>
    );
  }

                    <div>
                      <div className="field"><label>Vare</label><div>{vareById(currentModal.entry.vare_id)?.navn || '(slettet)'}</div></div>
                      <div className="field"><label>Antal</label><div>{fmtPakkeLoese(vareById(currentModal.entry.vare_id), currentModal.entry.antal_pakker, currentModal.entry.antal_loese)}{currentModal.entry.antal_pakker > 0 ? ` (= ${currentModal.entry.antal_stk} ${vareById(currentModal.entry.vare_id)?.enhed || ''})` : ''}</div></div>
                      {currentModal.entry.hvem && <div className="field"><label>Hvem</label><div>{currentModal.entry.hvem}</div></div>}
                      {currentModal.entry.note && <div className="field"><label>Note</label><div>{currentModal.entry.note}</div></div>}
                    </div>
                  )}
                </div>
                <div className="modal-foot">
                  {currentModal.entry._type === 'optaelling' && (<>
                    <button className="btn ghost" onClick={() => handleDeleteOptaelling(currentModal.entry)}>Slet</button>
                    <button className="btn ghost" onClick={() => openEditOptaelling(currentModal.entry)}>✎ Redigér</button>
                    <button className="btn ghost" onClick={() => { printRapport({ type: 'optaelling', entry: currentModal.entry }); setModal(null); }}>🖨 Udskriv</button>
                  </>)}
                  <button className="btn ghost" onClick={() => setModal(null)}>Luk</button>
                </div>
              </>)}

            </div>
          </div>
        )}
      </div>

      {scannerAaben && <BarcodeScanner onResult={opslaaStregkode} onClose={() => setScannerAaben(false)} />}

      <div className="print-report">
        {printView?.type === 'optaelling' && renderPrintOptaelling(printView.entry)}
        {printView?.type === 'periode' && renderPrintPeriode(printView.fra, printView.til)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
