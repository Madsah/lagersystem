<script type="text/babel">

const { useState, useEffect, useCallback, useRef } = React;

// ---- Helpers ----
function todayStr() { return new Date().toISOString().slice(0, 10); }
function nowISO() { return new Date().toISOString(); }
function fmtDateShort(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('da-DK', { day: '2-digit', month: 'short', year: 'numeric' });
}
function fmtDateTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('da-DK', { day: '2-digit', month: 'short' }) + ' kl. ' + d.toLocaleTimeString('da-DK', { hour: '2-digit', minute: '2-digit' });
}
function fmtPakkeLoese(vare, antalPakker, antalLoese) {
  if (!vare) return '';
  const p = antalPakker || 0, l = antalLoese || 0;
  if (vare.pakke_str && vare.pakke_antal && p > 0) {
    return l > 0 ? `${p} ${vare.pakke_str} + ${l} ${vare.enhed}` : `${p} ${vare.pakke_str}`;
  }
  return `${l} ${vare.enhed}`;
}
function harPakke(vare) {
  return !!(vare && vare.pakke_str && vare.pakke_antal && vare.pakke_antal > 0);
}
function toStkCombo(vare, antalPakker, antalLoese) {
  const p = parseFloat(antalPakker), l = parseFloat(antalLoese);
  const pVal = isNaN(p) ? 0 : p, lVal = isNaN(l) ? 0 : l;
  if (isNaN(p) && isNaN(l)) return null;
  if (harPakke(vare)) return +(pVal * vare.pakke_antal + lVal).toFixed(3);
  return lVal;
}
function daysSince(dateStr) {
  return Math.floor((new Date(todayStr()) - new Date(dateStr)) / 86400000);
}
function fmtMaaned(m) {
  const navne = ['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
  const [aar, maaned] = m.split('-');
  return `${navne[parseInt(maaned, 10) - 1]} ${aar}`;
}

// ---- CSV export ----
function csvCelle(v) {
  const s = (v === null || v === undefined) ? '' : String(v);
  if (/[;"\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}
function downloadCSV(filnavn, raekker) {
  const csv = raekker.map(r => r.map(csvCelle).join(';')).join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filnavn;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ---- POS text parsing ----
function parsePosTekst(raaTekst) {
  const linjer = raaTekst.split('\n').map(l => l.trim()).filter(Boolean);
  const resultater = [];
  linjer.forEach(linje => {
    let dele = linje.split('\t').map(s => s.trim()).filter(Boolean);
    let navn, antalStr;
    if (dele.length >= 2 && /-?\d/.test(dele[1])) { navn = dele[0]; antalStr = dele[1]; }
    else {
      const match = linje.match(/^(.*?)([\d.,]+)\s*(?:stk|x)?\.?\s*$/i);
      if (match) { navn = match[1].trim(); antalStr = match[2]; }
    }
    if (!navn || antalStr === undefined) return;
    let cleaned = antalStr.replace(/\s/g, '');
    const harKomma = cleaned.includes(','), harPunktum = cleaned.includes('.');
    if (harKomma && harPunktum) { cleaned = cleaned.replace(/\./g, '').replace(',', '.'); }
    else if (harKomma) { cleaned = cleaned.replace(',', '.'); }
    else if (harPunktum) { const ep = cleaned.split('.').pop(); if (ep.length === 3) cleaned = cleaned.replace(/\./g, ''); }
    const antal = parseFloat(cleaned);
    if (!navn || isNaN(antal)) return;
    resultater.push({ raaNavn: navn, antal });
  });
  return resultater;
}
function normaliserNavn(s) { return (s || '').toLowerCase().replace(/[^a-z0-9æøå]+/g, ' ').trim(); }
function matchScore(a, b) {
  const na = normaliserNavn(a), nb = normaliserNavn(b);
  if (!na || !nb) return 0;
  if (na === nb) return 1;
  if (nb.includes(na) || na.includes(nb)) return 0.85;
  const aO = na.split(' ').filter(Boolean), bO = nb.split(' ').filter(Boolean);
  if (!aO.length || !bO.length) return 0;
  return aO.filter(o => bO.includes(o)).length / Math.max(aO.length, bO.length);
}
function matchPosLinjer(linjer, varer) {
  return linjer.map(l => {
    let bedste = null, bedsteScore = 0;
    varer.forEach(v => { const s = matchScore(l.raaNavn, v.navn); if (s > bedsteScore) { bedsteScore = s; bedste = v; } });
    return { ...l, vareId: bedsteScore >= 0.34 ? (bedste ? bedste.id : null) : null, sikker: bedsteScore >= 0.7 };
  });
}

async function dbLoadAll(restaurantId) {
  const [
    { data: varer }, { data: optaellinger }, { data: leverancer },
    { data: spild }, { data: posTal }
  ] = await Promise.all([
    db.from('varer').select('*').eq('restaurant_id', restaurantId).order('navn'),
    db.from('optaellinger').select('*').eq('restaurant_id', restaurantId).order('dato'),
    db.from('leverancer').select('*').eq('restaurant_id', restaurantId).order('dato', { ascending: false }),
    db.from('spild').select('*').eq('restaurant_id', restaurantId).order('dato', { ascending: false }),
    db.from('pos_tal').select('*').eq('restaurant_id', restaurantId).order('dato', { ascending: false }),
  ]);
  return { varer: varer || [], optaellinger: optaellinger || [], leverancer: leverancer || [], spild: spild || [], posTal: posTal || [] };
}

// APP

function App() {
  const [session, setSession] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);

  useEffect(() => {
    db.auth.getSession().then(({ data: { session } }) => { setSession(session); setAuthLoading(false); });
    const { data: { subscription } } = db.auth.onAuthStateChange((_event, session) => setSession(session));
    return () => subscription.unsubscribe();
  }, []);

  if (authLoading) return <div className="spinner-wrap">Indlæser…</div>;
  if (!session) return <LoginScreen />;
  return <MainApp session={session} />;
}

// ================================================================
// LOGIN
// ================================================================
function LoginScreen() {
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  async function handleLogin(e) {
    e.preventDefault();
    setLoading(true); setError('');
    const { error } = await db.auth.signInWithPassword({ email, password: pw });
    if (error) setError('Forkert e-mail eller adgangskode.');
    setLoading(false);
  }

  return (
    <div className="login-wrap">
      <div className="login-box">
        <div className="login-brand">LAGER<span>/</span>SYSTEM</div>
        <div className="login-sub">Log ind for at fortsætte</div>
        <form onSubmit={handleLogin}>
          <div className="login-field"><label>E-mail</label><input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="din@email.dk" required autoFocus /></div>
          <div className="login-field"><label>Adgangskode</label><input type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="••••••••" required /></div>
          {error && <div className="login-error">{error}</div>}
          <button className="login-btn" type="submit" disabled={loading}>{loading ? 'Logger ind…' : 'Log ind'}</button>
        </form>
      </div>
    </div>
  );
}

function MainApp({ session }) {
  const [restauranter, setRestauranter] = useState([]);

  const [search, setSearch] = useState('');
  const [modal, setModal] = useState(null);
  const [printView, setPrintView] = useState(null);
  const [periodeFra, setPeriodeFra] = useState(() => { const d = new Date(); d.setDate(d.getDate() - 30); return d.toISOString().slice(0, 10); });
  const [periodeTil, setPeriodeTil] = useState(todayStr());
  const [eksportMenuAaben, setEksportMenuAaben] = useState(false);
  const [saving, setSaving] = useState(false);

  // Load restaurants on mount
  useEffect(() => {

  useEffect(() => {

    setLoading(true);

  }, [activeRestId]);

  // Print effect — before early returns (Rules of Hooks)
  useEffect(() => {

    document.body.classList.add('printing-report');
    const cleanup = () => { document.body.classList.remove('printing-report'); setPrintView(null); window.removeEventListener('afterprint', cleanup); };
    window.addEventListener('afterprint', cleanup);
    const t = setTimeout(() => window.print(), 50);
    return () => { clearTimeout(t); window.removeEventListener('afterprint', cleanup); };
  }, [printView]);

  // Close export menu on outside click
  useEffect(() => {
    if (!eksportMenuAaben) return;
    const handler = (e) => { if (!e.target.closest('.export-wrap')) setEksportMenuAaben(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [eksportMenuAaben]);

  const restNavn = (id) => (restauranter.find(r => r.id === id) || {}).navn || '';
  const vareById = (id) => restData.varer.find(v => v.id === id);
  const varerForRest = restData.varer;

  // ---- Data helpers ----
  function getOptaellingerSorted() { return [...restData.optaellinger].sort((a, b) => a.dato.localeCompare(b.dato)); }

  function getLatestCount(vareId) {
    const opts = getOptaellingerSorted();
    for (let i = opts.length - 1; i >= 0; i--) {
      const c = opts[i].counts && opts[i].counts[vareId];
      if (c !== undefined) {
        const stk = typeof c === 'object' ? c.stk : c;
        return { stk, antalPakker: typeof c === 'object' ? c.antalPakker : undefined, antalLoese: typeof c === 'object' ? c.antalLoese : undefined, dato: opts[i].dato };
      }
    }
    return null;
  }

  function computeForbrug() {
    const opts = getOptaellingerSorted();
    const result = {};
    varerForRest.forEach(it => {
      const relevantOpts = opts.filter(o => o.counts && o.counts[it.id] !== undefined);
      if (relevantOpts.length < 2) { result[it.id] = null; return; }
      const prev = relevantOpts[relevantOpts.length - 2];
      const last = relevantOpts[relevantOpts.length - 1];
      const leveret = restData.leverancer.filter(l => l.vare_id === it.id && l.dato > prev.dato && l.dato <= last.dato).reduce((s, l) => s + l.antal_stk, 0);
      const spildTotal = restData.spild.filter(sp => sp.vare_id === it.id && sp.dato > prev.dato && sp.dato <= last.dato).reduce((s, sp) => s + sp.antal_stk, 0);
      const prevVal = typeof prev.counts[it.id] === 'object' ? prev.counts[it.id].stk : prev.counts[it.id];
      const lastVal = typeof last.counts[it.id] === 'object' ? last.counts[it.id].stk : last.counts[it.id];
      const forbrugTotal = prevVal + leveret - lastVal;
      const solgt = forbrugTotal - spildTotal;
      const dage = Math.max(1, Math.round((new Date(last.dato) - new Date(prev.dato)) / 86400000));
      result[it.id] = { forbrugTotal, solgt, spild: spildTotal, leveret, fra: prev.dato, til: last.dato, dage, perDag: +(solgt / dage).toFixed(2) };
    });
    return result;
  }

  function computeMaanedsForbrug() {
    const opts = getOptaellingerSorted();
    const perVare = {}, alleMaaneder = new Set();
    varerForRest.forEach(it => {
      perVare[it.id] = {};
      const relevantOpts = opts.filter(o => o.counts && o.counts[it.id] !== undefined);
      for (let i = 1; i < relevantOpts.length; i++) {
        const prev = relevantOpts[i - 1], last = relevantOpts[i];
        const leveret = restData.leverancer.filter(l => l.vare_id === it.id && l.dato > prev.dato && l.dato <= last.dato).reduce((s, l) => s + l.antal_stk, 0);
        const spildTotal = restData.spild.filter(sp => sp.vare_id === it.id && sp.dato > prev.dato && sp.dato <= last.dato).reduce((s, sp) => s + sp.antal_stk, 0);
        const prevVal = typeof prev.counts[it.id] === 'object' ? prev.counts[it.id].stk : prev.counts[it.id];
        const lastVal = typeof last.counts[it.id] === 'object' ? last.counts[it.id].stk : last.counts[it.id];
        const solgt = (prevVal + leveret - lastVal) - spildTotal;
        const maanedKey = last.dato.slice(0, 7);
        alleMaaneder.add(maanedKey);
        perVare[it.id][maanedKey] = (perVare[it.id][maanedKey] || 0) + solgt;
      }
    });
    return { perVare, maaneder: Array.from(alleMaaneder).sort() };
  }

  function vurderLagerstatus(latest, forbrugEntry) {
    if (!latest || !forbrugEntry || !forbrugEntry.perDag || forbrugEntry.perDag <= 0) return null;
    const dageTilbage = latest.stk / forbrugEntry.perDag;
    const niveau = dageTilbage < 7 ? 'crit' : dageTilbage < 14 ? 'low' : 'good';
    return { dageTilbage: Math.round(dageTilbage), niveau };
  }

  function getOptaellingsStatus() {
    const opts = getOptaellingerSorted();
    if (opts.length === 0) return { aldrigTalt: true, dage: null };
    const sidst = opts[opts.length - 1];
    return { aldrigTalt: false, dage: daysSince(sidst.dato), dato: sidst.dato };
  }

  async function submitOptaelling() {
    const counts = {};

    varerForRest.forEach(it => {
      const c = modal.counts[it.id] || {};

    });

    if (modal.redigerId) {

  // ---- Export ----
  function eksporterAlt() {

      raekker.push([it.navn, it.kategori, it.enhed, it.pakke_str || '', it.pakke_antal || '', latest ? latest.stk : '', latest ? latest.dato : '', f ? f.solgt : '', f ? f.spild : '', f ? f.perDag : '']);
    });
    downloadCSV(`lageroversigt_${restNavn(activeRestId)}_${todayStr()}.csv`, raekker);

  }
  function eksporterSpild() {

  // ---- Print report renderers ----
  function renderPrintOptaelling(entry) {
    return (
      <div>
        <div className="print-report-head">
          <h1>Optælling — {restNavn(activeRestId)}</h1>
          <div className="print-report-meta">Dato: {fmtDateShort(entry.dato)}{entry.hvem ? ` · Talt af: ${entry.hvem}` : ''} · Udskrevet {fmtDateTime(nowISO())}</div>

              return <tr key={vid}><td>{it?.navn || '(slettet)'}</td><td className="item-cat">{it?.kategori || ''}</td><td className="num">{stk} {it?.enhed || ''}{detalje && it?.pakke_antal ? ` (${detalje})` : ''}</td></tr>;

  function renderPrintPeriode(fra, til) {
    const lev = restData.leverancer.filter(l => l.dato >= fra && l.dato <= til);
    const spild = restData.spild.filter(sp => sp.dato >= fra && sp.dato <= til);
    const opts = restData.optaellinger.filter(o => o.dato >= fra && o.dato <= til);
    const posTal = restData.posTal.filter(p => p.dato >= fra && p.dato <= til);
    const sumPrVare = (entries, field) => { const s = {}; entries.forEach(e => { s[e.vare_id] = (s[e.vare_id] || 0) + e[field]; }); return s; };
    const levSum = sumPrVare(lev, 'antal_stk'), spildSum = sumPrVare(spild, 'antal_stk'), posSum = {};
    posTal.forEach(p => { posSum[p.vare_id] = (posSum[p.vare_id] || 0) + p.antal; });
    const alleIds = new Set([...Object.keys(levSum), ...Object.keys(spildSum), ...Object.keys(posSum)]);
    return (
      <div>
        <div className="print-report-head">
          <h1>Periode-rapport — {restNavn(activeRestId)}</h1>
          <div className="print-report-meta">{fmtDateShort(fra)} – {fmtDateShort(til)} · Udskrevet {fmtDateTime(nowISO())}</div>
        </div>
        <div className="print-report-section-title">Leverancer &amp; spild</div>
        {alleIds.size === 0 ? <div className="print-report-empty">Ingen data i denne periode.</div> : (
          <table>
            <thead><tr><th>Vare</th><th className="num">Leveret</th><th className="num">Spild</th><th className="num">POS-salg</th></tr></thead>
            <tbody>
              {Array.from(alleIds).map(vid => {
                const it = vareById(vid);
                return <tr key={vid}><td>{it?.navn || '(slettet)'}</td><td className="num">{levSum[vid] !== undefined ? `${levSum[vid]} ${it?.enhed || ''}` : '—'}</td><td className="num">{spildSum[vid] !== undefined ? `${spildSum[vid]} ${it?.enhed || ''}` : '—'}</td><td className="num">{posSum[vid] !== undefined ? `${posSum[vid]} ${it?.enhed || ''}` : '—'}</td></tr>;
              })}
            </tbody>
          </table>
        )}
        <div className="print-report-section-title">Optællinger</div>
        {opts.length === 0 ? <div className="print-report-empty">Ingen optællinger i denne periode.</div> : opts.map(o => (
          <div key={o.id} style={{ marginBottom: 14 }}>
            <div style={{ fontWeight: 700, marginBottom: 4 }}>{fmtDateShort(o.dato)}{o.hvem ? ` — ${o.hvem}` : ''}</div>
            <table><thead><tr><th>Vare</th><th className="num">Talt antal</th></tr></thead><tbody>
              {Object.entries(o.counts || {}).map(([vid, c]) => {
                const it = vareById(vid);
                const stk = typeof c === 'object' ? c.stk : c;
                return <tr key={vid}><td>{it?.navn || '(slettet)'}</td><td className="num">{stk} {it?.enhed || ''}</td></tr>;
              })}
            </tbody></table>
          </div>
        ))}
      </div>
    );
  }

  // ---- PakkeInput component ----
  function PakkeInput({ vare, pakker, loese, onChangePakker, onChangeLoese }) {
    if (!harPakke(vare)) return null;
    const total = toStkCombo(vare, pakker, loese);
    return (
      <div className="field-row" style={{ marginBottom: 0 }}>
        <div className="field"><label>Antal {vare.pakke_str}</label><input type="number" min="0" step="any" value={pakker} onChange={e => onChangePakker(e.target.value)} placeholder="0" /></div>
        <div className="field"><label>Antal løse {vare.enhed}</label><input type="number" min="0" step="any" value={loese} onChange={e => onChangeLoese(e.target.value)} placeholder="0" /></div>
        {(pakker || loese) && total !== null && <div className="conversion-hint" style={{ alignSelf: 'center', marginTop: 18 }}>= {total} {vare.enhed} i alt</div>}
      </div>
    );
  }

  if (loading) return <div className="spinner-wrap">Indlæser data…</div>;

  // ---- Views ----
  const forbrug = computeForbrug();
  const optStatus = getOptaellingsStatus();
  const PAAMINDELSESDAGE = 14;

  function renderLager() {
    const items = varerForRest.filter(it => !search || it.navn.toLowerCase().includes(search.toLowerCase()) || it.kategori.toLowerCase().includes(search.toLowerCase()));
    return (
      <div>
        {varerForRest.length > 0 && (optStatus.aldrigTalt || optStatus.dage >= PAAMINDELSESDAGE) && (
          <div className="banner reminder">
            {optStatus.aldrigTalt ? '⚠ Der er ikke lavet nogen optælling på denne restaurant endnu.' : `⚠ Sidst talt for ${optStatus.dage} dage siden (${fmtDateShort(optStatus.dato)}). Overvej en ny optælling.`}
          </div>
        )}
        <div className="toolbar no-print">
          <input className="search-box" placeholder="Søg vare eller kategori…" value={search} onChange={e => setSearch(e.target.value)} />
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <button className="btn ghost" onClick={openAddItem}>+ Tilføj vare</button>
            <button className="btn ghost" onClick={() => openAddDelivery(null)}>+ Levering</button>
            <button className="btn ghost" onClick={() => openAddSpild(null)}>+ Spild</button>
            <button className="btn ghost" onClick={openPosIndsaet}>+ Salgstal fra POS</button>
            <button className="btn rust" onClick={openNewOptaelling}>Ny optælling</button>
          </div>
        </div>
        {items.length === 0 ? (
          <div className="empty-state"><div className="display">Ingen varer endnu</div><div>Tilføj din første vare for at komme i gang.</div></div>
        ) : (
          <table className="lager-table">
            <thead><tr>
              <th>Vare</th><th>Kategori</th><th className="num">Senest talt</th>
              <th className="num">Status</th><th className="num">Solgt siden sidst</th>
              <th className="num">Spild</th><th className="num">Pr. dag</th><th className="no-print"></th>
            </tr></thead>
            <tbody>
              {items.map(it => {
                const latest = getLatestCount(it.id);
                const f = forbrug[it.id];
                const status = vurderLagerstatus(latest, f);
                return (
                  <tr key={it.id}>
                    <td><div className="item-name">{it.navn}</div><div className="item-cat">{it.enhed}{harPakke(it) ? ` · 1 ${it.pakke_str} = ${it.pakke_antal} ${it.enhed}` : ''}</div></td>
                    <td className="item-cat">{it.kategori}</td>
                    <td className="num">
                      {latest ? (harPakke(it) && latest.antalPakker !== undefined ? (
                        <><div>{fmtPakkeLoese(it, latest.antalPakker, latest.antalLoese)}</div><div className="item-cat">= {latest.stk} {it.enhed}</div></>
                      ) : `${latest.stk} ${it.enhed}`) : <span className="item-cat">ikke talt</span>}
                    </td>
                    <td className="num">{status ? <span className={`tag ${status.niveau}`}>~{status.dageTilbage} dage</span> : <span className="item-cat">—</span>}</td>
                    <td className="num">{f ? <span className={`delta ${f.solgt > 0 ? 'used' : 'zero'}`}>{f.solgt} {it.enhed}</span> : <span className="item-cat">—</span>}</td>
                    <td className="num">{f && f.spild > 0 ? <span className="delta used">{f.spild} {it.enhed}</span> : <span className="item-cat">—</span>}</td>
                    <td className="num">{f ? <span className="item-cat">{f.perDag}/dag</span> : <span className="item-cat">—</span>}</td>
                    <td className="no-print">
                      <div className="row-actions">
                        <button className="icon-btn" title="Levering" onClick={() => openAddDelivery(it)}>+</button>
                        <button className="icon-btn" title="Spild" onClick={() => openAddSpild(it)}>⚠</button>
                        <button className="icon-btn" title="Redigér" onClick={() => openEditItem(it)}>✎</button>
                        <button className="icon-btn" title="Fjern" onClick={() => handleDeleteItem(it)}>×</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
    );
  }

  function renderHistorik() {
    const combined = [
      ...restData.optaellinger.map(o => ({ ...o, _type: 'optaelling' })),
      ...restData.leverancer.map(l => ({ ...l, _type: 'levering' })),
      ...restData.spild.map(sp => ({ ...sp, _type: 'spild' })),
      ...restData.posTal.map(p => ({ ...p, _type: 'pos' })),
    ].sort((a, b) => (b.dato + (b.oprettet || '')).localeCompare(a.dato + (a.oprettet || '')));
    const typeLabel = t => t === 'optaelling' ? 'Optælling' : t === 'levering' ? 'Levering' : t === 'pos' ? 'POS-salg' : 'Spild';
    return (
      <div>
        <div className="section-title">Historik</div>
        <div className="periode-toolbar no-print">
          <div className="field"><label>Udskriv periode fra</label><input type="date" value={periodeFra} onChange={e => setPeriodeFra(e.target.value)} /></div>
          <div className="field"><label>til</label><input type="date" value={periodeTil} onChange={e => setPeriodeTil(e.target.value)} /></div>
          <button className="btn ghost" onClick={() => printRapport({ type: 'periode', fra: periodeFra, til: periodeTil })}>🖨 Udskriv periode-rapport</button>
        </div>
        {combined.length === 0 ? (
          <div className="empty-state"><div className="display">Ingen historik endnu</div></div>
        ) : (
          <div className="history-list">
            {combined.map(e => {
              const vare = e._type !== 'optaelling' ? vareById(e.vare_id || e.vareId) : null;
              return (
                <div className="history-row" key={e._type + e.id} onClick={() => openHistoryDetail(e, typeLabel(e._type))}>
                  <span className="history-date">{fmtDateShort(e.dato)}</span>
                  <span className={`history-type ${e._type}`}>{typeLabel(e._type)}</span>
                  <span style={{ flex: 1 }}>
                    {e._type === 'optaelling'
                      ? `${Object.keys(e.counts || {}).length} varer talt${e.note ? ' — ' + e.note : ''}`
                      : e._type === 'pos'
                      ? `${e.antal} ${vare?.enhed || ''} solgt (POS) — ${vare?.navn || '(slettet)'}`
                      : `${fmtPakkeLoese(vare, e.antal_pakker, e.antal_loese)} ${vare?.navn || '(slettet)'}${e.note ? ' — ' + e.note : ''}`}
                  </span>
                  {e.hvem && <span className="history-who">{e.hvem}</span>}
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  function renderSammenligning() {
    const { perVare, maaneder } = computeMaanedsForbrug();
    if (maaneder.length === 0) return <div className="empty-state"><div className="display">Ikke nok data endnu</div><div>Du skal have optællinger i mindst to måneder.</div></div>;
    return (
      <div>
        <div className="section-title">Sammenligning måned-til-måned</div>
        <div className="compare-table">
          <table>
            <thead><tr><th>Vare</th>{maaneder.map(m => <th key={m} className="month-col">{fmtMaaned(m)}</th>)}</tr></thead>
            <tbody>
              {varerForRest.map(it => {
                const rad = perVare[it.id] || {};
                const vaerdier = maaneder.map(m => rad[m]);
                return (
                  <tr key={it.id}>
                    <td><div className="item-name">{it.navn}</div><div className="item-cat">{it.enhed}</div></td>
                    {maaneder.map((m, i) => {
                      const v = rad[m];
                      if (v === undefined) return <td key={m} className="num month-col"><span className="item-cat">—</span></td>;
                      const prevV = i > 0 ? vaerdier[i - 1] : undefined;
                      const trendClass = prevV !== undefined && v !== prevV ? (v > prevV ? 'compare-cell-up' : 'compare-cell-down') : '';
                      return <td key={m} className={`num month-col ${trendClass}`}>{v}</td>;
                    })}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    );
  }

  function renderIndstillinger() {
    return (
      <div>
        <div className="section-title">Restauranter</div>
        <table>
          <thead><tr><th>Navn</th><th className="num">Varer</th><th></th></tr></thead>
          <tbody>
            {restauranter.map(r => (
              <tr key={r.id}>
                <td className="item-name">{r.navn}</td>
                <td className="num">{r.id === activeRestId ? varerForRest.length : '…'}</td>
                <td><div className="row-actions">
                  <button className="btn small ghost" onClick={() => openEditRest(r)}>Omdøb</button>
                  <button className="btn small ghost" onClick={() => handleDeleteRest(r)}>Slet</button>
                </div></td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{ marginTop: 16 }}>
          <button className="btn rust" onClick={openAddRest}>+ Tilføj restaurant</button>
        </div>
        <div style={{ marginTop: 28, paddingTop: 20, borderTop: '1px solid var(--line)' }}>
          <div className="section-title">Brugere</div>
          <div className="hint" style={{ marginTop: 0 }}>Tilføj og administrér brugere direkte i Supabase-dashboardet under Authentication → Users. Opret en ny bruger med en e-mail og adgangskode — de kan derefter logge ind her.</div>
          <div style={{ marginTop: 10 }}><a href="https://supabase.com/dashboard" target="_blank" rel="noopener" className="btn ghost">Åbn Supabase Dashboard ↗</a></div>
        </div>
        <div style={{ marginTop: 28, paddingTop: 20, borderTop: '1px solid var(--line)' }}>
          <div className="section-title">Konto</div>
          <div className="hint" style={{ marginTop: 0 }}>Logget ind som: {session.user.email}</div>
          <button className="btn ghost" onClick={() => db.auth.signOut()}>Log ud</button>
        </div>
      </div>
    );
  }

  // ---- Modal helpers for optaelling list ----
  function renderOptaellingListe(m) {
    const erUdfyldt = it => { const c = m.counts[it.id] || {}; return (c.pakker !== '' && c.pakker !== undefined) || (c.loese !== '' && c.loese !== undefined); };
    const antalUdfyldt = varerForRest.filter(erUdfyldt).length;
    const synlige = m.kunManglende ? varerForRest.filter(it => !erUdfyldt(it)) : varerForRest;
    const kategorier = [];
    synlige.forEach(it => { const k = it.kategori || 'Andet'; let g = kategorier.find(g => g.navn === k); if (!g) { g = { navn: k, varer: [] }; kategorier.push(g); } g.varer.push(it); });
    return (
      <>
        <div className="opt-toolbar">
          <button type="button" className={`opt-filter-toggle ${m.kunManglende ? 'active' : ''}`} onClick={() => setModal({ ...m, kunManglende: !m.kunManglende })}>
            {m.kunManglende ? '✓ Viser kun manglende' : 'Vis kun manglende'}
          </button>
          <span className="opt-progress">{antalUdfyldt} / {varerForRest.length} talt</span>
        </div>
        {kategorier.length === 0 ? (
          <div className="hint">Alle varer er talt. Fjern filtret for at se dem igen.</div>
        ) : kategorier.map(gruppe => {
          const lukket = !!m.lukkedeKategorier[gruppe.navn];
          return (
            <div className="kategori-group" key={gruppe.navn}>
              <div className={`kategori-head ${lukket ? 'collapsed' : ''}`}
                onClick={() => setModal({ ...m, lukkedeKategorier: { ...m.lukkedeKategorier, [gruppe.navn]: !lukket } })}>
                <span className="chevron">▾</span><span>{gruppe.navn}</span>
                <span className="kategori-count">{gruppe.varer.filter(erUdfyldt).length}/{gruppe.varer.length}</span>
              </div>
              {!lukket && gruppe.varer.map(it => {
                const c = m.counts[it.id] || { pakker: '', loese: '' };
                return (
                  <div className={`count-row ${erUdfyldt(it) ? 'is-counted' : ''}`} key={it.id}>
                    <div className="count-row-name"><div className="item-name">{it.navn}</div><div className="item-cat">{it.enhed}</div></div>
                    {harPakke(it) ? (
                      <div className="count-pakke-group">
                        <input className="count-input-small" type="number" min="0" step="any" placeholder="0" value={c.pakker} onChange={e => setModal({ ...m, counts: { ...m.counts, [it.id]: { ...c, pakker: e.target.value } } })} />
                        <span className="unit-label">{it.pakke_str}</span><span className="unit-label">+</span>
                        <input className="count-input-small" type="number" min="0" step="any" placeholder="0" value={c.loese} onChange={e => setModal({ ...m, counts: { ...m.counts, [it.id]: { ...c, loese: e.target.value } } })} />
                        <span className="unit-label">løse {it.enhed}</span>
                      </div>
                    ) : (
                      <input className="count-input" type="number" min="0" step="any" placeholder="0" value={c.loese} onChange={e => setModal({ ...m, counts: { ...m.counts, [it.id]: { ...c, loese: e.target.value } } })} />
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}
      </>
    );
  }

  const currentModal = modal;

  return (
    <div>
      <div className="app-shell">
        <div className="topbar">
          <div className="brand">
            <div className="brand-mark">LAGER<span>/</span>SYSTEM</div>
            <div className="brand-sub">Optælling, leverancer &amp; forbrug</div>
          </div>
          <div className="topbar-right no-print">
            {saving && <span style={{ fontSize: 11, color: 'var(--ink-soft)' }}>Gemmer…</span>}
            <div className="export-wrap">
              <button className="btn small ghost" onClick={() => setEksportMenuAaben(!eksportMenuAaben)}>⬇ Eksportér</button>
              {eksportMenuAaben && (
                <div className="export-menu">
                  <button onClick={() => { eksporterAlt(); setEksportMenuAaben(false); }}>Lageroversigt</button>
                  <button onClick={() => { eksporterOptaellinger(); setEksportMenuAaben(false); }}>Alle optællinger</button>
                  <button onClick={() => { eksporterLeverancer(); setEksportMenuAaben(false); }}>Alle leverancer</button>
                  <button onClick={() => { eksporterSpild(); setEksportMenuAaben(false); }}>Alt spild</button>
                  <button onClick={() => { eksporterPosTalCSV(); setEksportMenuAaben(false); }}>POS-salgstal</button>
                </div>
              )}
            </div>
            <button className="btn small ghost" onClick={doPrint}>🖨 Udskriv</button>
          </div>
        </div>

        <div className="nav no-print">
          {restauranter.map(r => (
            <button key={r.id} className={`nav-btn ${activeRestId === r.id ? 'active' : ''}`} onClick={() => { setActiveRestId(r.id); setView('lager'); setSearch(''); }}>{r.navn}</button>
          ))}
          <button className="nav-add" onClick={openAddRest}>+ Restaurant</button>
        </div>

        <div className="view-tabs no-print">
          <button className={`vt-btn ${view === 'lager' ? 'active' : ''}`} onClick={() => setView('lager')}>Lager</button>
          <button className={`vt-btn ${view === 'historik' ? 'active' : ''}`} onClick={() => setView('historik')}>Historik</button>
          <button className={`vt-btn ${view === 'sammenligning' ? 'active' : ''}`} onClick={() => setView('sammenligning')}>Sammenligning</button>
          <button className={`vt-btn ${view === 'indstillinger' ? 'active' : ''}`} onClick={() => setView('indstillinger')}>Indstillinger</button>
        </div>

        <div className="panel">
          {view === 'lager' && renderLager()}
          {view === 'historik' && renderHistorik()}
          {view === 'sammenligning' && renderSammenligning()}
          {view === 'indstillinger' && renderIndstillinger()}
        </div>

        {currentModal && (
          <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) setModal(null); }}>
            <div className={`modal ${currentModal.type === 'optaelling' || currentModal.type === 'pos-indsaet' ? 'wide' : ''}`}>

              {currentModal.type === 'rest-add' && (<>
                <div className="modal-head"><div className="modal-title">Tilføj restaurant</div><button className="modal-close" onClick={() => setModal(null)}>×</button></div>
                <div className="modal-body"><div className="field"><label>Navn</label><input value={currentModal.navn} onChange={e => setModal({ ...currentModal, navn: e.target.value })} placeholder="f.eks. Strandkroen" autoFocus /></div></div>
                <div className="modal-foot"><button className="btn ghost" onClick={() => setModal(null)}>Annullér</button><button className="btn rust" onClick={submitAddRest} disabled={saving}>Tilføj</button></div>
              </>)}

              {currentModal.type === 'rest-edit' && (<>
                <div className="modal-head"><div className="modal-title">Omdøb restaurant</div><button className="modal-close" onClick={() => setModal(null)}>×</button></div>
                <div className="modal-body"><div className="field"><label>Navn</label><input value={currentModal.navn} onChange={e => setModal({ ...currentModal, navn: e.target.value })} autoFocus /></div></div>
                <div className="modal-foot"><button className="btn ghost" onClick={() => setModal(null)}>Annullér</button><button className="btn rust" onClick={submitEditRest} disabled={saving}>Gem</button></div>
              </>)}

              {currentModal.type === 'vare-add' && (<>
                <div className="modal-head"><div className="modal-title">Tilføj vare</div><button className="modal-close" onClick={() => setModal(null)}>×</button></div>
                <div className="modal-body">
                  <div className="field"><label>Varenavn</label><input value={currentModal.navn} onChange={e => setModal({ ...currentModal, navn: e.target.value })} placeholder="f.eks. Carlsberg fadøl" autoFocus /></div>
                  <div className="field-row">
                    <div className="field"><label>Kategori</label><input value={currentModal.kategori} onChange={e => setModal({ ...currentModal, kategori: e.target.value })} placeholder="f.eks. Øl" /></div>
                    <div className="field"><label>Enhed</label><input value={currentModal.enhed} onChange={e => setModal({ ...currentModal, enhed: e.target.value })} placeholder="stk / flasker" /></div>
                  </div>
                  <div className="field"><label><input type="checkbox" checked={currentModal.brugPakke} onChange={e => setModal({ ...currentModal, brugPakke: e.target.checked })} style={{ width: 'auto', marginRight: 6 }} />Kommer i ramme/kasse</label></div>
                  {currentModal.brugPakke && (
                    <div className="field-row">
                      <div className="field"><label>Hvad hedder pakken?</label><input value={currentModal.pakkeStr} onChange={e => setModal({ ...currentModal, pakkeStr: e.target.value })} placeholder="ramme / kasse" /></div>
                      <div className="field"><label>Antal {currentModal.enhed} pr. pakke</label><input type="number" min="1" value={currentModal.pakkeAntal} onChange={e => setModal({ ...currentModal, pakkeAntal: e.target.value })} placeholder="f.eks. 24" /></div>
                    </div>
                  )}
                </div>
                <div className="modal-foot"><button className="btn ghost" onClick={() => setModal(null)}>Annullér</button><button className="btn rust" onClick={submitAddItem} disabled={saving}>Tilføj</button></div>
              </>)}

              {currentModal.type === 'vare-edit' && (<>
                <div className="modal-head"><div className="modal-title">Redigér vare</div><button className="modal-close" onClick={() => setModal(null)}>×</button></div>
                <div className="modal-body">
                  <div className="field"><label>Varenavn</label><input value={currentModal.item.navn} onChange={e => setModal({ ...currentModal, item: { ...currentModal.item, navn: e.target.value } })} /></div>
                  <div className="field-row">
                    <div className="field"><label>Kategori</label><input value={currentModal.item.kategori} onChange={e => setModal({ ...currentModal, item: { ...currentModal.item, kategori: e.target.value } })} /></div>
                    <div className="field"><label>Enhed</label><input value={currentModal.item.enhed} onChange={e => setModal({ ...currentModal, item: { ...currentModal.item, enhed: e.target.value } })} /></div>
                  </div>
                  <div className="field"><label><input type="checkbox" checked={currentModal.brugPakke} onChange={e => setModal({ ...currentModal, brugPakke: e.target.checked })} style={{ width: 'auto', marginRight: 6 }} />Kommer i ramme/kasse</label></div>
                  {currentModal.brugPakke && (
                    <div className="field-row">
                      <div className="field"><label>Hvad hedder pakken?</label><input value={currentModal.item.pakke_str || ''} onChange={e => setModal({ ...currentModal, item: { ...currentModal.item, pakke_str: e.target.value } })} placeholder="ramme / kasse" /></div>
                      <div className="field"><label>Antal {currentModal.item.enhed} pr. pakke</label><input type="number" min="1" value={currentModal.item.pakke_antal || ''} onChange={e => setModal({ ...currentModal, item: { ...currentModal.item, pakke_antal: e.target.value } })} /></div>
                    </div>
                  )}
                </div>
                <div className="modal-foot"><button className="btn ghost" onClick={() => setModal(null)}>Annullér</button><button className="btn rust" onClick={submitEditItem} disabled={saving}>Gem</button></div>
              </>)}

              {currentModal.type === 'levering' && (<>
                <div className="modal-head"><div className="modal-title">Registrér levering</div><button className="modal-close" onClick={() => setModal(null)}>×</button></div>
                <div className="modal-body">
                  <div className="field"><label>Vare</label>
                    <select value={currentModal.vareId} onChange={e => setModal({ ...currentModal, vareId: e.target.value, antalPakker: '', antalLoese: '' })}>
                      {varerForRest.map(it => <option key={it.id} value={it.id}>{it.navn}</option>)}
                    </select>
                  </div>
                  {harPakke(vareById(currentModal.vareId)) ? (
                    <PakkeInput vare={vareById(currentModal.vareId)} pakker={currentModal.antalPakker} loese={currentModal.antalLoese}
                      onChangePakker={v => setModal({ ...currentModal, antalPakker: v })}
                      onChangeLoese={v => setModal({ ...currentModal, antalLoese: v })} />
                  ) : (
                    <div className="field"><label>Antal ({vareById(currentModal.vareId)?.enhed || 'stk'})</label><input type="number" min="0" step="any" value={currentModal.antalLoese} onChange={e => setModal({ ...currentModal, antalLoese: e.target.value })} autoFocus /></div>
                  )}
                  <div className="field"><label>Dato</label><input type="date" value={currentModal.dato} onChange={e => setModal({ ...currentModal, dato: e.target.value })} /></div>
                  <div className="field"><label>Hvem (valgfri)</label><input value={currentModal.hvem} onChange={e => setModal({ ...currentModal, hvem: e.target.value })} placeholder="dit navn" /></div>
                  <div className="field"><label>Note (valgfri)</label><input value={currentModal.note} onChange={e => setModal({ ...currentModal, note: e.target.value })} placeholder="f.eks. leverandørnavn" /></div>
                </div>
                <div className="modal-foot"><button className="btn ghost" onClick={() => setModal(null)}>Annullér</button><button className="btn rust" onClick={submitLevering} disabled={saving}>Registrér</button></div>
              </>)}

              {currentModal.type === 'spild' && (<>
                <div className="modal-head"><div className="modal-title">Registrér spild</div><button className="modal-close" onClick={() => setModal(null)}>×</button></div>
                <div className="modal-body">
                  <div className="field"><label>Vare</label>
                    <select value={currentModal.vareId} onChange={e => setModal({ ...currentModal, vareId: e.target.value, antalPakker: '', antalLoese: '' })}>
                      {varerForRest.map(it => <option key={it.id} value={it.id}>{it.navn}</option>)}
                    </select>
                  </div>
                  {harPakke(vareById(currentModal.vareId)) ? (
                    <PakkeInput vare={vareById(currentModal.vareId)} pakker={currentModal.antalPakker} loese={currentModal.antalLoese}
                      onChangePakker={v => setModal({ ...currentModal, antalPakker: v })}
                      onChangeLoese={v => setModal({ ...currentModal, antalLoese: v })} />
                  ) : (
                    <div className="field"><label>Antal ({vareById(currentModal.vareId)?.enhed || 'stk'})</label><input type="number" min="0" step="any" value={currentModal.antalLoese} onChange={e => setModal({ ...currentModal, antalLoese: e.target.value })} autoFocus /></div>
                  )}
                  <div className="field"><label>Dato</label><input type="date" value={currentModal.dato} onChange={e => setModal({ ...currentModal, dato: e.target.value })} /></div>
                  <div className="field"><label>Hvem (valgfri)</label><input value={currentModal.hvem} onChange={e => setModal({ ...currentModal, hvem: e.target.value })} placeholder="dit navn" /></div>
                  <div className="field"><label>Årsag (valgfri)</label><input value={currentModal.note} onChange={e => setModal({ ...currentModal, note: e.target.value })} placeholder="f.eks. gik i stykker" /></div>
                </div>
                <div className="modal-foot"><button className="btn ghost" onClick={() => setModal(null)}>Annullér</button><button className="btn rust" onClick={submitSpildEntry} disabled={saving}>Registrér</button></div>
              </>)}

              {currentModal.type === 'optaelling' && (<>
                <div className="modal-head"><div className="modal-title">{currentModal.redigerId ? 'Redigér optælling' : 'Ny optælling'}</div><button className="modal-close" onClick={() => setModal(null)}>×</button></div>
                <div className="modal-body">
                  <div className="field-row">
                    <div className="field"><label>Dato</label><input type="date" value={currentModal.dato} onChange={e => setModal({ ...currentModal, dato: e.target.value })} /></div>
                    <div className="field"><label>Hvem (valgfri)</label><input value={currentModal.hvem} onChange={e => setModal({ ...currentModal, hvem: e.target.value })} placeholder="dit navn" /></div>
                  </div>
                  <div className="hint">Tæl kun <strong>lukkede, fulde</strong> rammer under "rammer" — anbrudte rammer og enkeltflasker tælles som "løse styk".</div>
                  {varerForRest.length === 0 ? <div className="hint">Ingen varer at tælle endnu.</div> : renderOptaellingListe(currentModal)}
                  <div className="field" style={{ marginTop: 14 }}><label>Note (valgfri)</label><input value={currentModal.note} onChange={e => setModal({ ...currentModal, note: e.target.value })} placeholder="f.eks. særlige bemærkninger" /></div>
                </div>
                <div className="modal-foot"><button className="btn ghost" onClick={() => setModal(null)}>Annullér</button><button className="btn rust" onClick={submitOptaelling} disabled={saving}>{currentModal.redigerId ? 'Gem ændringer' : 'Gem optælling'}</button></div>
              </>)}

              {currentModal.type === 'pos-indsaet' && currentModal.trin === 'indtast' && (<>
                <div className="modal-head"><div className="modal-title">Indsæt salgstal fra POS</div><button className="modal-close" onClick={() => setModal(null)}>×</button></div>
                <div className="modal-body">
                  <div className="hint">Kopiér en liste fra dit kassesystem og indsæt den herunder — én vare pr. linje. Systemet prøver at genkende hvilken vare hver linje hører til; du kan rette det bagefter.</div>
                  <div className="field"><label>Dato</label><input type="date" value={currentModal.dato} onChange={e => setModal({ ...currentModal, dato: e.target.value })} /></div>
                  <div className="field"><label>Indsæt tekst her</label><textarea rows="10" value={currentModal.raaTekst} onChange={e => setModal({ ...currentModal, raaTekst: e.target.value })} placeholder={'Coca-Cola 33cl\t45\nSprite 33cl\t12'} autoFocus /></div>
                </div>
                <div className="modal-foot"><button className="btn ghost" onClick={() => setModal(null)}>Annullér</button><button className="btn rust" onClick={tolkPosTekst}>Læs tekst</button></div>
              </>)}

              {currentModal.type === 'pos-indsaet' && currentModal.trin === 'bekraeft' && (<>
                <div className="modal-head"><div className="modal-title">Bekræft varer</div><button className="modal-close" onClick={() => setModal(null)}>×</button></div>
                <div className="modal-body">
                  <div className="hint">Tjek at hver linje er tilknyttet den rigtige vare.</div>
                  <table>
                    <thead><tr><th>Fra POS</th><th className="num">Antal</th><th>Tilknyttet vare</th></tr></thead>
                    <tbody>
                      {currentModal.matchede.map((m, i) => (
                        <tr key={i}>
                          <td className="item-cat">{m.raaNavn}</td>
                          <td className="num">{m.antal}</td>
                          <td>
                            <select value={m.vareId || ''} onChange={e => { const ny = [...currentModal.matchede]; ny[i] = { ...m, vareId: e.target.value || null }; setModal({ ...currentModal, matchede: ny }); }}>
                              <option value="">— Spring over —</option>
                              {varerForRest.map(v => <option key={v.id} value={v.id}>{v.navn}</option>)}
                            </select>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div className="modal-foot">
                  <button className="btn ghost" onClick={() => setModal({ ...currentModal, trin: 'indtast' })}>Tilbage</button>
                  <button className="btn rust" onClick={submitPosTal} disabled={saving}>Gem {currentModal.matchede.filter(m => m.vareId).length} salgstal</button>
                </div>
              </>)}

              {currentModal.type === 'historik-detalje' && (<>
                <div className="modal-head"><div className="modal-title">{currentModal.typeLabel} — {fmtDateShort(currentModal.entry.dato)}</div><button className="modal-close" onClick={() => setModal(null)}>×</button></div>
                <div className="modal-body">
                  {currentModal.entry._type === 'optaelling' ? (
                    <>
                      <table>
                        <thead><tr><th>Vare</th><th className="num">Talt antal</th></tr></thead>
                        <tbody>
                          {Object.entries(currentModal.entry.counts || {}).map(([vid, c]) => {
                            const it = vareById(vid);
                            const stk = typeof c === 'object' ? c.stk : c;
                            const detalje = typeof c === 'object' && it ? fmtPakkeLoese(it, c.antalPakker, c.antalLoese) : null;
                            return <tr key={vid}><td>{it?.navn || '(slettet)'}</td><td className="num">{stk} {it?.enhed || ''}{detalje && it?.pakke_antal ? ` (${detalje})` : ''}</td></tr>;
                          })}
                        </tbody>
                      </table>
                      {currentModal.entry.hvem && <div className="field" style={{ marginTop: 14 }}><label>Talt af</label><div>{currentModal.entry.hvem}</div></div>}
                      {currentModal.entry.note && <div className="field" style={{ marginTop: 14 }}><label>Note</label><div>{currentModal.entry.note}</div></div>}
                      <div className="field" style={{ marginTop: 14 }}><label>Registreret</label><div className="item-cat">{fmtDateTime(currentModal.entry.oprettet)}</div></div>
                      {currentModal.entry.redigeret && <div className="field"><label>Senest redigeret</label><div className="item-cat">{fmtDateTime(currentModal.entry.redigeret)}</div></div>}
                    </>
                  ) : currentModal.entry._type === 'pos' ? (
                    <div>
                      <div className="field"><label>Vare</label><div>{vareById(currentModal.entry.vare_id)?.navn || '(slettet)'}</div></div>
                      <div className="field"><label>Antal solgt (POS)</label><div>{currentModal.entry.antal} {vareById(currentModal.entry.vare_id)?.enhed || ''}</div></div>
                      <div className="field"><label>Tekst fra POS</label><div className="item-cat">{currentModal.entry.raa_navn}</div></div>
                    </div>
                  ) : (
                    <div>
                      <div className="field"><label>Vare</label><div>{vareById(currentModal.entry.vare_id)?.navn || '(slettet)'}</div></div>
                      <div className="field"><label>Antal</label><div>{fmtPakkeLoese(vareById(currentModal.entry.vare_id), currentModal.entry.antal_pakker, currentModal.entry.antal_loese)}{currentModal.entry.antal_pakker > 0 ? ` (= ${currentModal.entry.antal_stk} ${vareById(currentModal.entry.vare_id)?.enhed || ''})` : ''}</div></div>
                      {currentModal.entry.hvem && <div className="field"><label>Hvem</label><div>{currentModal.entry.hvem}</div></div>}
                      {currentModal.entry.note && <div className="field"><label>Note</label><div>{currentModal.entry.note}</div></div>}
                    </div>
                  )}
                </div>
                <div className="modal-foot">
                  {currentModal.entry._type === 'optaelling' && (<>
                    <button className="btn ghost" onClick={() => handleDeleteOptaelling(currentModal.entry)}>Slet</button>
                    <button className="btn ghost" onClick={() => openEditOptaelling(currentModal.entry)}>✎ Redigér</button>
                    <button className="btn ghost" onClick={() => { printRapport({ type: 'optaelling', entry: currentModal.entry }); setModal(null); }}>🖨 Udskriv</button>
                  </>)}
                  <button className="btn ghost" onClick={() => setModal(null)}>Luk</button>
                </div>
              </>)}

            </div>
          </div>
        )}
      </div>

      <div className="print-report">
        {printView?.type === 'optaelling' && renderPrintOptaelling(printView.entry)}
        {printView?.type === 'periode' && renderPrintPeriode(printView.fra, printView.til)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
